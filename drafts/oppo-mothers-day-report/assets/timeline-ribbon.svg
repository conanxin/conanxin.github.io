<!-- timeline-ribbon.svg: 横向事件时间线 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-label="OPPO母亲节文案事件时间线">
  <title>事件时间线</title>
  <desc>2026年5月8日至5月11日OPPO母亲节文案事件关键节点时间线</desc>

  <!-- 背景 -->
  <rect width="800" height="200" fill="#FAF8F5"/>

  <!-- 主时间线轴 -->
  <line x1="50" y1="100" x2="750" y2="100" stroke="#2C2C2C" stroke-width="2"/>

  <!-- 节点 1: 5月8日 - 文案发布与首次道歉 -->
  <g transform="translate(100, 100)">
    <circle r="10" fill="#C41E3A"/>
    <circle r="4" fill="#FFFFFF"/>
    <text y="-25" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2C2C2C">5月8日</text>
    <text y="-40" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#C41E3A">文案发布</text>
    <text y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">争议爆发</text>
    <text y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">首次道歉</text>
  </g>

  <!-- 节点 2: 5月9日 - 舆情持续 -->
  <g transform="translate(275, 100)">
    <circle r="7" fill="#8B7355"/>
    <text y="-20" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#6B6B6B">5月9日</text>
    <text y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">舆情持续发酵</text>
    <text y="37" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">[公开资料不足]</text>
  </g>

  <!-- 节点 3: 5月10日 - 机构回应 -->
  <g transform="translate(450, 100)">
    <circle r="10" fill="#8B7355"/>
    <circle r="4" fill="#FFFFFF"/>
    <text y="-25" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2C2C2C">5月10日</text>
    <text y="-40" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#8B7355">机构回应</text>
    <text y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">中国广告协会发声</text>
    <text y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">武大文学院声明</text>
  </g>

  <!-- 节点 4: 5月11日 - 二次道歉与问责 -->
  <g transform="translate(625, 100)">
    <circle r="12" fill="#C41E3A"/>
    <circle r="5" fill="#FFFFFF"/>
    <text y="-28" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#2C2C2C">5月11日</text>
    <text y="-43" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#C41E3A">企业问责</text>
    <text y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">OPPO二次道歉</text>
    <text y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">内部问责通告</text>
  </g>

  <!-- 轴端标记 -->
  <text x="50" y="115" font-family="Arial, sans-serif" font-size="9" fill="#8B7355">5月</text>
  <text x="750" y="115" font-family="Arial, sans-serif" font-size="9" fill="#8B7355">5月</text>

  <!-- 底部说明 -->
  <text x="400" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B" font-style="italic">来源：观察者网(src_003)、联合早报(src_005)、IT之家(src_004)、武汉大学文学院(src_006)</text>
</svg>