<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <defs>
    <style>
      
  .bg { fill: #f7f4ee; }
  .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; font-weight: 700; }
  .body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .url { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .accent-red { fill: #c25e5e; }
  .accent-blue { fill: #4a6fa5; }
  .accent-green { fill: #4a7c59; }
  .ink { fill: #2a2520; }
  .ink-secondary { fill: #5a544d; }
  .ink-tertiary { fill: #8a837a; }

    </style>
  </defs>
  <rect class="bg" width="1200" height="1600"/>
  
  <!-- Layered papers illustration -->
  <g transform="translate(600, 480)">
    <!-- Bottom layer: remittance -->
    <rect x="-160" y="-100" width="320" height="200" rx="3" fill="#fff" stroke="#4a6fa5" stroke-width="1.5" opacity="0.9"/>
    <text x="0" y="-60" text-anchor="middle" class="body" font-size="16" fill="#4a6fa5" opacity="0.7">REMITTANCE</text>
    <line x1="-120" y1="-30" x2="120" y2="-30" stroke="#4a6fa5" stroke-width="1" opacity="0.3"/>
    <line x1="-120" y1="-10" x2="80" y2="-10" stroke="#4a6fa5" stroke-width="1" opacity="0.3"/>
    <line x1="-120" y1="10" x2="100" y2="10" stroke="#4a6fa5" stroke-width="1" opacity="0.3"/>
    <line x1="-120" y1="30" x2="60" y2="30" stroke="#4a6fa5" stroke-width="1" opacity="0.3"/>
    <line x1="-120" y1="50" x2="120" y2="50" stroke="#4a6fa5" stroke-width="1" opacity="0.3"/>
    
    <!-- Middle layer: letter -->
    <rect x="-140" y="-140" width="280" height="200" rx="3" fill="#fff" stroke="#c25e5e" stroke-width="1.5" opacity="0.95"/>
    <line x1="-100" y1="-100" x2="100" y2="-100" stroke="#c25e5e" stroke-width="1" opacity="0.3"/>
    <line x1="-100" y1="-75" x2="80" y2="-75" stroke="#c25e5e" stroke-width="1" opacity="0.3"/>
    <line x1="-100" y1="-50" x2="90" y2="-50" stroke="#c25e5e" stroke-width="1" opacity="0.3"/>
    <line x1="-100" y1="-25" x2="70" y2="-25" stroke="#c25e5e" stroke-width="1" opacity="0.3"/>
    <line x1="-100" y1="0" x2="100" y2="0" stroke="#c25e5e" stroke-width="1" opacity="0.3"/>
    
    <!-- Top layer: postmark -->
    <circle cx="100" cy="-120" r="30" fill="none" stroke="#c25e5e" stroke-width="1.5" opacity="0.5"/>
    <text x="100" y="-115" text-anchor="middle" class="body" font-size="10" fill="#c25e5e" opacity="0.6">QIAOPI</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="820" text-anchor="middle" class="title" font-size="52" fill="#2a2520">侨批不是普通情书</text>
  
  <!-- Subtitle line -->
  <rect x="450" y="850" width="300" height="2" fill="#4a6fa5" opacity="0.4"/>
  
  <!-- Body text -->
  <text x="600" y="940" text-anchor="middle" class="body" font-size="30" fill="#5a544d">在《给阿嬷的情书》中，</text>
  <text x="600" y="990" text-anchor="middle" class="body" font-size="30" fill="#5a544d">侨批既是家书，也是汇款凭证；</text>
  <text x="600" y="1040" text-anchor="middle" class="body" font-size="30" fill="#5a544d">既是报平安，也是家庭的精神支柱。</text>
  
  <!-- Bottom URL -->
  <text x="600" y="1480" text-anchor="middle" class="url" font-size="20" fill="#8a837a">conanxin.github.io/projects/letter-theme-page</text>
  
  <rect x="100" y="1520" width="1000" height="2" fill="#d4cfc7" opacity="0.4"/>
</svg>