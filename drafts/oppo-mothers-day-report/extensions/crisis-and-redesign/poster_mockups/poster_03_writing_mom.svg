<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <title>妈妈，也有自己的热爱 — 深夜写作的妈妈</title>
  <desc>OPPO母亲节传播重设计海报第三张：展示妈妈在夜晚安静写作、精神独立的时刻</desc>

  <!-- Background: night study -->
  <rect width="1080" height="1440" fill="#1E2030"/>
  <rect width="1080" height="1440" fill="#2A2E40" opacity="0.6"/>

  <!-- Abstract window with moonlight -->
  <rect x="680" y="60" width="320" height="420" rx="6" fill="#1A1E2C"/>
  <rect x="690" y="70" width="300" height="400" rx="4" fill="#1E2A3A"/>
  <!-- Moon -->
  <circle cx="850" cy="180" r="55" fill="#E8E4D8" opacity="0.85"/>
  <circle cx="865" cy="170" r="55" fill="#2A2E40"/>
  <!-- Stars -->
  <circle cx="720" cy="120" r="2" fill="#E8E4D8" opacity="0.6"/>
  <circle cx="750" cy="160" r="1.5" fill="#E8E4D8" opacity="0.5"/>
  <circle cx="800" cy="130" r="1" fill="#E8E4D8" opacity="0.4"/>
  <circle cx="920" cy="240" r="2" fill="#E8E4D8" opacity="0.5"/>
  <circle cx="780" cy="280" r="1" fill="#E8E4D8" opacity="0.3"/>

  <!-- Desk -->
  <rect x="80" y="780" width="900" height="20" rx="3" fill="#8B6040" opacity="0.7"/>
  <rect x="120" y="800" width="20" height="280" fill="#6B4828" opacity="0.5"/>
  <rect x="920" y="800" width="20" height="280" fill="#6B4828" opacity="0.5"/>

  <!-- Lamp glow (warm light) -->
  <ellipse cx="200" cy="650" rx="150" ry="100" fill="#FFE4A0" opacity="0.08"/>

  <!-- Desk lamp (abstract) -->
  <g transform="translate(160, 580)">
    <rect x="0" y="0" width="8" height="80" fill="#4A4038" opacity="0.6"/>
    <ellipse cx="50" cy="70" rx="50" ry="25" fill="#3A3028" opacity="0.7"/>
    <ellipse cx="50" cy="65" rx="45" ry="20" fill="#FFE4A0" opacity="0.5"/>
    <ellipse cx="50" cy="60" rx="35" ry="15" fill="#FFF0C0" opacity="0.3"/>
  </g>

  <!-- Book/journal on desk -->
  <g transform="translate(280, 720)">
    <rect width="140" height="100" rx="3" fill="#F5E8D0" opacity="0.9"/>
    <rect x="5" y="5" width="130" height="90" rx="2" fill="#FAF5EC" opacity="0.7"/>
    <!-- Lines of writing -->
    <line x1="15" y1="25" x2="125" y2="25" stroke="#D4C8B0" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="38" x2="110" y2="38" stroke="#D4C8B0" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="51" x2="120" y2="51" stroke="#D4C8B0" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="64" x2="90" y2="64" stroke="#D4C8B0" stroke-width="1" opacity="0.6"/>
    <!-- Pen -->
    <rect x="125" y="15" width="4" height="65" rx="2" fill="#3A3028" opacity="0.5" transform="rotate(15, 127, 47)"/>
  </g>

  <!-- Tea cup -->
  <g transform="translate(480, 740)">
    <ellipse cx="25" cy="10" rx="22" ry="8" fill="#D4C8B8" opacity="0.7"/>
    <path d="M3,10 C3,35 10,50 25,50 C40,50 47,35 47,10" fill="#E8DCD0" opacity="0.6"/>
    <ellipse cx="25" cy="10" rx="15" ry="5" fill="#E8D0B0" opacity="0.4"/>
    <!-- Steam -->
    <path d="M20,-5 Q18,-20 22,-30" stroke="#D4D0C8" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M28,-5 Q30,-18 26,-28" stroke="#D4D0C8" stroke-width="1.5" fill="none" opacity="0.25"/>
  </g>

  <!-- Female figure seated, writing -->
  <g transform="translate(400, 580)">
    <!-- Chair back -->
    <rect x="5" y="0" width="90" height="120" rx="8" fill="#5A4A38" opacity="0.3"/>

    <!-- Body (seated) -->
    <path d="M25,110 C10,115 5,145 8,180 L15,250 L90,250 L95,180 C98,145 90,115 70,110 Z" fill="#D4B8A0" opacity="0.8"/>

    <!-- Neck -->
    <rect x="40" y="88" width="18" height="25" fill="#F5E6D3"/>

    <!-- Head -->
    <ellipse cx="50" cy="68" rx="35" ry="38" fill="#F5E6D3"/>

    <!-- Hair (down, loose) -->
    <path d="M15,60 C10,20 50,-5 50,-5 C50,-5 90,20 85,60 C85,70 80,75 78,75 L22,75 C20,75 15,70 15,60 Z" fill="#2A1A0A"/>
    <path d="M15,60 C12,80 10,100 8,130" stroke="#2A1A0A" stroke-width="8" fill="none" opacity="0.4"/>
    <path d="M85,60 C88,80 90,100 92,130" stroke="#2A1A0A" stroke-width="8" fill="none" opacity="0.4"/>

    <!-- Face (looking down, concentration) -->
    <ellipse cx="40" cy="70" rx="2" ry="2" fill="#2A1A0A" opacity="0.3"/>
    <ellipse cx="60" cy="70" rx="2" ry="2" fill="#2A1A0A" opacity="0.3"/>

    <!-- Glasses (subtle) -->
    <ellipse cx="40" cy="70" rx="10" ry="7" fill="none" stroke="#4A3A2A" stroke-width="1" opacity="0.25"/>
    <ellipse cx="60" cy="70" rx="10" ry="7" fill="none" stroke="#4A3A2A" stroke-width="1" opacity="0.25"/>
    <line x1="50" y1="70" x2="50" y2="70" stroke="#4A3A2A" stroke-width="1" opacity="0.3"/>

    <!-- Arms -->
    <path d="M8,145 C-15,175 -10,210 10,230" stroke="#F5E6D3" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M95,145 C115,175 110,210 95,230" stroke="#F5E6D3" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Hands near desk -->
    <ellipse cx="60" cy="225" rx="15" ry="10" fill="#F5E6D3" opacity="0.8"/>

    <!-- Legs (seated) -->
    <path d="M25,248 C20,290 40,310 40,340" stroke="#C4A090" stroke-width="22" fill="none" stroke-linecap="round"/>
    <path d="M75,248 C80,290 60,310 60,340" stroke="#C4A090" stroke-width="22" fill="none" stroke-linecap="round"/>
  </g>

  <!-- OPPO phone on desk (very subtle) -->
  <g transform="translate(600, 755)">
    <rect width="24" height="42" rx="4" fill="#1C1C1C" opacity="0.12"/>
    <rect x="2" y="2" width="20" height="38" rx="3" fill="#2C2C2C" opacity="0.08"/>
  </g>

  <!-- Stars/cosmic elements (symbolizing "her own universe") -->
  <circle cx="120" cy="400" r="2" fill="#E8E4D8" opacity="0.2"/>
  <circle cx="80" cy="500" r="1.5" fill="#E8E4D8" opacity="0.15"/>
  <circle cx="150" cy="350" r="1" fill="#E8E4D8" opacity="0.1"/>
  <circle cx="950" cy="450" r="2" fill="#E8E4D8" opacity="0.18"/>
  <circle cx="1000" cy="550" r="1" fill="#E8E4D8" opacity="0.12"/>
  <circle cx="920" cy="380" r="1.5" fill="#E8E4D8" opacity="0.15"/>

  <!-- Main text area (light background) -->
  <rect x="60" y="1100" width="960" height="270" rx="8" fill="#FAF8F5" opacity="0.96"/>

  <!-- Main headline -->
  <text x="540" y="1160" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="50" font-weight="600" fill="#2C2C2C" letter-spacing="0">
    夜深以后，
  </text>
  <text x="540" y="1225" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="50" font-weight="600" fill="#2C2C2C" letter-spacing="0">
    她写下自己的宇宙。
  </text>

  <!-- Sub text -->
  <text x="540" y="1290" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" fill="#6B6B6B" letter-spacing="1">
    妈妈的故事，不只有家庭这一页。
  </text>

  <!-- Brand tag -->
  <text x="540" y="1350" text-anchor="middle" font-family="system-ui, 'PingFang SC', sans-serif" font-size="18" fill="#A09080" letter-spacing="3">
    OPPO · 母亲节特别呈现
  </text>

  <!-- Bottom disclaimer -->
  <rect x="0" y="1400" width="1080" height="40" fill="#2C2C2C" opacity="0.06"/>
  <text x="540" y="1425" text-anchor="middle" font-family="system-ui, 'PingFang SC', sans-serif" font-size="13" fill="#8B7355" opacity="0.7" letter-spacing="2">
    母亲节传播重设计研究稿｜非官方发布物 · 记录她自己的热爱
  </text>
</svg>
