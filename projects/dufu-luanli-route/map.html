<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杜甫诗路真实地图原型</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="map.css">
</head>
<body>

<header class="map-header">
  <div class="map-header-inner">
    <h1>杜甫诗路真实地图原型</h1>
    <p class="map-subtitle">今日地点对应与文旅路线示意</p>
    <p class="map-disclaimer">
      本地图展示的是唐代地名与今日地点的对应关系；坐标为现代参考点，路线为阅读示意连线，不代表杜甫当年精确行走轨迹。部分地点存在考证差异。
    </p>
    <a href="index.html" class="back-link">← 返回交互页面</a>
    <div class="map-top-links">
      <a href="exports/dufu_route_handbook.html" target="_blank" rel="noopener">HTML 手册</a>
      <a href="exports/dufu_route_handbook.pdf" download>PDF 手册</a>
    </div>
  </div>
</header>

<main class="map-main">
  <section class="map-stage-filters" id="map-stage-filters" aria-label="阶段筛选">
    <button class="stage-chip active" data-stage="all">全部 <span class="chip-count" id="count-all"></span></button>
    <button class="stage-chip" data-stage="长安奉先">长安奉先 <span class="chip-count" id="count-长安奉先"></span></button>
    <button class="stage-chip" data-stage="安史逃亡">安史逃亡 <span class="chip-count" id="count-安史逃亡"></span></button>
    <button class="stage-chip" data-stage="陷京见证">陷京见证 <span class="chip-count" id="count-陷京见证"></span></button>
    <button class="stage-chip" data-stage="三吏三别">三吏三别 <span class="chip-count" id="count-三吏三别"></span></button>
    <button class="stage-chip" data-stage="秦州陇蜀">秦州陇蜀 <span class="chip-count" id="count-秦州陇蜀"></span></button>
    <button class="stage-chip" data-stage="成都草堂">成都草堂 <span class="chip-count" id="count-成都草堂"></span></button>
  </section>

  <div class="map-layout">
    <div class="map-container">
      <div id="dufu-real-map" aria-label="杜甫流离路线地图"></div>
    </div>
    <aside class="map-detail" id="map-detail" aria-label="地点详情">
      <div class="detail-placeholder">
        <p>点击地图上的标记点<br>查看地点详情、相关诗歌与历史意义</p>
      </div>
    </aside>
  </div>
</main>

<script src="vendor/leaflet/leaflet.js"></script>
<script src="map.js"></script>
</body>
</html>
