<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0097a7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g stroke="#1e2d40" stroke-width="1" opacity="0.6">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Quill / pen icon -->
  <g transform="translate(70, 75)">
    <path d="M50 70 Q30 50 35 25 Q38 10 50 5 Q62 10 65 25 Q70 50 50 70Z" fill="#00bcd4" opacity="0.7"/>
    <path d="M48 70 Q33 55 37 30 Q40 15 50 10 Q60 15 63 30 Q66 50 48 70Z" fill="#0097a7" opacity="0.5"/>
    <line x1="50" y1="70" x2="50" y2="85" stroke="#00bcd4" stroke-width="3"/>
    <line x1="35" y1="78" x2="65" y2="78" stroke="#00bcd4" stroke-width="2"/>
  </g>

  <text x="60" y="168" font-family="sans-serif" font-size="42" font-weight="bold" fill="#e8f0fa" filter="url(#glow)">旧互联网建设者资料库</text>
  <text x="60" y="215" font-family="sans-serif" font-size="22" fill="#8ba4c7" letter-spacing="2">Internet Builder Archive</text>

  <rect x="60" y="235" width="500" height="2" fill="url(#accent)" rx="1"/>

  <text x="60" y="295" font-family="sans-serif" font-size="54" font-weight="bold" fill="#00bcd4">创作者心智与长期主义</text>
  <text x="60" y="340" font-family="sans-serif" font-size="24" fill="#0097a7">Creator Mindset &amp; Long-termism</text>

  <text x="60" y="385" font-family="sans-serif" font-size="20" fill="#8ba4c7">关于写作、创造、技艺、行动力、个人项目</text>
  <text x="60" y="415" font-family="sans-serif" font-size="20" fill="#8ba4c7">与长期练习的资料路径。</text>

  <g transform="translate(60, 445)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#1a2a40" stroke="#00bcd4" stroke-width="1.5"/>
    <text x="70" y="32" font-family="sans-serif" font-size="32" font-weight="bold" fill="#00bcd4" text-anchor="middle">9</text>
    <text x="70" y="55" font-family="sans-serif" font-size="14" fill="#8ba4c7" text-anchor="middle">items</text>
  </g>

  <g transform="translate(220, 445)">
    <rect x="0" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#00bcd4" stroke-width="1"/>
    <text x="35" y="23" font-family="sans-serif" font-size="14" fill="#00bcd4" text-anchor="middle">创作</text>

    <rect x="80" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#00bcd4" stroke-width="1"/>
    <text x="115" y="23" font-family="sans-serif" font-size="14" fill="#00bcd4" text-anchor="middle">技艺</text>

    <rect x="160" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#00bcd4" stroke-width="1"/>
    <text x="195" y="23" font-family="sans-serif" font-size="14" fill="#00bcd4" text-anchor="middle">行动力</text>

    <rect x="240" y="0" width="90" height="34" rx="17" fill="#1a2a40" stroke="#00bcd4" stroke-width="1"/>
    <text x="285" y="23" font-family="sans-serif" font-size="14" fill="#00bcd4" text-anchor="middle">长期主义</text>
  </g>

  <rect x="0" y="560" width="1200" height="2" fill="#1e2d40"/>
  <text x="60" y="595" font-family="sans-serif" font-size="20" fill="#00bcd4">conanxin.github.io/projects/internet-builder-archive/</text>

  <g transform="translate(920, 100)" opacity="0.12">
    <circle cx="100" cy="100" r="180" fill="none" stroke="#00bcd4" stroke-width="1"/>
    <circle cx="100" cy="100" r="140" fill="none" stroke="#00bcd4" stroke-width="1"/>
    <circle cx="100" cy="100" r="100" fill="none" stroke="#00bcd4" stroke-width="1"/>
  </g>
</svg>