--green);color:#fff}.section{padding:64px 4vw}.section-head{display:flex;align-items:end;justify-content:space-between;gap:20px;margin-bottom:28px;border-bottom:1px solid var(--ink);padding-bottom:14px}.section h2{font-size:clamp(32px,5vw,60px);margin:0}.today{display:grid;grid-template-columns:minmax(0,1.4fr) minmax(280px,.6fr);background:var(--paper2);border:1px solid var(--line)}.today figure{margin:0;min-height:540px;background:#d9d3c4}.today img{width:100%;height:100%;max-height:680px;object-fit:contain}.today-copy{padding:42px}.today-copy h3{font-size:40px;margin:12px 0}.latin{font-style:italic;color:var(--green)}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}.btn{border:1px solid var(--ink);background:transparent;padding:10px 14px;font:13px var(--sans)}.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}.shelf{display:grid;grid-template-columns:repeat(20,minmax(35px,1fr));align-items:end;min-height:310px;border-bottom:12px solid #433a30;padding:0 8px;overflow-x:auto}.spine{height:var(--h);min-width:38px;border:1px solid #5b4b3d;background:var(--c);color:#f7f0df;writing-mode:vertical-rl;padding:12px 7px;font:11px var(--sans);text-align:left}.spine:hover{transform:translateY(-9px)}.toolbar{position:sticky;top:58px;z-index:15;display:flex;flex-wrap:wrap;gap:10px;padding:14px 4vw;background:rgba(247,243,232,.96);border-bottom:1px solid var(--line)}.toolbar input,.toolbar select{min-height:40px;border:1px solid var(--line);background:#fffdf7;padding:0 11px}.toolbar input{min-width:260px;flex:1}.view-title{padding:42px 4vw 20px}.view-title h1{font-size:clamp(38px,6vw,72px);margin:8px 0}.count{font:12px var(--sans);color:var(--muted)}.wall{display:grid;grid-template-columns:repeat(auto-fill,minmax(var(--tile),1fr));gap:18px;padding:18px 4vw 60px}.plate{border:0;background:transparent;text-align:left;padding:0}.plate .mat{aspect-ratio:3/4;background:#ddd5c5;overflow:hidden}.plate img{width:100%;height:100%;object-fit:cover;transition:transform .2s}.plate:hover img{transform:scale(1.025)}.plate h3{font-size:17px;margin:9px 0 3px}.meta{font:11px var(--sans);color:var(--muted)}.more{display:block;margin:0 auto 70px}.volume-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));border-top:1px solid var(--line);margin:0 4vw 70px}.volume{padding:22px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.volume h3{font-size:25px;margin:8px 0}.volume small{font:11px var(--sans);color:var(--red)}.about{max-width:1100px;margin:auto;padding:65px 5vw}.about h1{font-size:clamp(46px,7vw,86px)}.about h2{font-size:34px;margin-top:70px;border-top:1px solid var(--line);padding-top:20px}.about p,.about li{font-size:17px;line-height:1.9}.roadmap{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--line);border:1px solid var(--line)}.phase{background:var(--paper2);padding:24px}.phase b{color:var(--red);font:12px var(--sans)}.phase h3{font-size:22px}.status{padding:18px;border-left:4px solid var(--green);background:#e4e8dd}.viewer{position:fixed;inset:0;z-index:50;background:#151916;color:#f6f0e1;display:none;grid-template-columns:minmax(0,2fr) minmax(300px,1fr)}.viewer.open{display:grid}.stage{position:relative;overflow:hidden;display:grid;place-items:center;background:#101310}.stage img{max-width:92%;max-height:88vh;object-fit:contain;transform:scale(var(--zoom,1));transition:transform .15s}.viewer-info{padding:34px;overflow:auto;border-left:1px solid #4b514d}.viewer-info h2{font-size:38px}.viewer-tools{position:absolute;left:18px;top:18px;z-index:2;display:flex;gap:6px}.viewer-tools button,.close{background:#eee9dc;border:0;padding:9px 12px}.close{position:absolute;right:18px;top:18px;z-index:4}.navplate{display:flex;gap:8px;margin-top:30px}.note{font-size:13px;line-height:1.7;color:#c4c9c4}.hide{display:none!important}:focus-visible{outline:3px solid #b66a46;outline-offset:3px}@media(max-width:780px){.top nav a:nth-child(3){display:none}.hero{grid-template-columns:1fr;min-height:0}.hero-copy{padding:50px 6vw}.hero-art{height:55vh}.entrances{grid-template-columns:1fr 1fr}.entrance:nth-child(2){border-right:0}.today{grid-template-columns:1fr}.today figure{min-height:360px}.shelf{grid-template-columns:repeat(40,38px)}.viewer.open{display:block}.stage{height:63vh}.viewer-info{height:37vh;border-left:0;border-top:1px solid #4b514d;padding:18px 22px}.viewer-info h2{font-size:27px}.roadmap{grid-template-columns:1fr}.toolbar{top:58px}.toolbar input{min-width:100%}}

<script>
const V=[
['蜂鸟自然史·上','The Natural History of Humming-Birds, Part I',1833,'鸟类',35],['猴类','Monkeys',1833,'哺乳动物',62],['蜂鸟自然史·下','The Natural History of Humming-Birds, Part II',1833,'鸟类',31],['猫科动物','The Felinæ',1834,'哺乳动物',37],['鸡形目鸟类','Gallinaceous Birds',1834,'鸟类',31],['猎禽与游禽','Game-Birds',1834,'鸟类',31],['鲈形鱼类','Fishes of the Perch Family',1835,'鱼类',36],['甲虫','Beetles',1835,'昆虫',31],['鸽类','Pigeons',1835,'鸟类',31],['英国蝴蝶','British Butterflies',1835,'昆虫',35],['反刍动物·上','Ruminantia, Part I',1835,'哺乳动物',34],['反刍动物·下','Ruminantia, Part II',1836,'哺乳动物',32],['厚皮四足兽','Thick-Skinned Quadrupeds',1836,'哺乳动物',30],['英国蛾类与天蛾','British Moths, Sphinxes, &c.',1836,'昆虫',31],['鹦鹉','Parrots',1836,'鸟类',31],['鲸类等','Whales, &c.',1836,'哺乳动物',31],['西非鸟类·上','Birds of Western Africa, Part I',1837,'鸟类',33],['外国蝴蝶','Foreign Butterflies',1837,'昆虫',31],['西非鸟类·下','Birds of Western Africa, Part II',1837,'鸟类',33],['大不列颠与爱尔兰鸟类·猛禽','Birds of Great Britain & Ireland, Part I',1837,'鸟类',35],['霸鹟与鹟类','Flycatchers',1838,'鸟类',32],['英国四足兽','British Quadrupeds',1838,'哺乳动物',35],['两栖生活的食肉兽','Amphibious Carnivora',1838,'哺乳动物',32],['大不列颠与爱尔兰鸟类·鸣禽','Birds of Great Britain & Ireland, Part II',1839,'鸟类',31],['犬类·上','Dogs, Part I',1839,'哺乳动物',35],['蜜蜂','Bees',1840,'昆虫',31],['鱼类：结构与经济用途','Fishes: Structure and Economical Uses',1840,'鱼类',33],['犬类·下','Dogs, Part II',1840,'哺乳动物',37],['昆虫学导论','Introduction to Entomology',1840,'昆虫',37],['有袋类','Marsupialia or Pouched Animals',1841,'哺乳动物',36],['马','Horses',1841,'哺乳动物',33],['英属圭亚那鱼类·上','Fishes of British Guiana, Part I',1841,'鱼类',32],['异域蛾类','Exotic Moths',1841,'昆虫',31],['大不列颠与爱尔兰鸟类·陆禽与涉禽','Birds of Great Britain & Ireland, Part III',1842,'鸟类',35],['哺乳动物导论','Introduction to Mammalia',1842,'哺乳动物',32],['太阳鸟','Nectariniadæ, or Sun-Birds',1842,'鸟类',31],['英国鱼类·上','British Fishes, Part I',1843,'鱼类',35],['英属圭亚那鱼类·下','Fishes of British Guiana, Part II',1843,'鱼类',31],['英国鱼类·下','British Fishes, Part II',1843,'鱼类',35],['大不列颠与爱尔兰鸟类·游禽','Birds of Great Britain & Ireland, Part IV',1843,'鸟类',32]];
const known={"1-1":['斑点锯嘴蜂鸟','Spotted Saw-Billed Humming-Bird','Ramphodon nævius'],"1-2":['反嘴蜂鸟','Avoset-Billed Humming-Bird','Trochilus avocetta'],"2-1":['猴类图版 1','Monkeys, Plate I',''],"4-1":['猫科图版 1','The Felinæ, Plate I',''],"10-1":['英国蝴蝶图版 1','British Butterflies, Plate I','']};
const plates=[];V.forEach((v,vi)=>{for(let p=1;p<=v[4];p++){const k=known[`${vi+1}-${p}`]||[`第 ${p} 图版（中文名待核）`,`Plate ${p}`,''];plates.push({v:vi+1,p,cat:v[3],zh:k[0],en:k[1],latin:k[2],img:`https://www.c82.net/images/naturalists-library/vol-${vi+1}/plates/plate-${p}.jpg`})}});
const app=document.querySelector('#app');let current=0,zoom=1,shown=80,filtered=plates;
function home(){const pick=plates[Math.floor(new Date().getDate()*37%plates.length)];app.innerHTML=`<section class="hero"><div class="hero-copy"><p class="eyebrow">THE NATURALIST’S LIBRARY · 1833—1843</p><h1>博物学家<br>图书馆</h1><p class="en">AN ILLUSTRATED ARCHIVE OF THE LIVING WORLD</p><p class="lead">四十卷袖珍自然史、上千幅手工着色图版，以及十九世纪人类观看、分类和描绘自然的方式。</p><div class="stats"><span><b>40</b>卷册</span><span><b>1,347</b>幅图版</span><span><b>42</b>篇传记</span><span><b>1833—43</b>出版年代</span></div></div><div class="hero-art"><img src="${pick.img}" alt="${pick.zh}"><span>VOL. ${pick.v} · PLATE ${pick.p}</span></div></section><section class="entrances">${['鸟类','哺乳动物','昆虫','鱼类'].map((c,i)=>`<button class="entrance" data-cat="${c}"><span>0${i+1}</span><b>${c}</b><small>进入馆藏抽屉 →</small></button>`).join('')}</section><section class="section"><div class="section-head"><div><p class="label">TODAY’S SPECIMEN</p><h2>今日标本</h2></div><button class="btn" id="shuffle">换一幅</button></div><div class="today"><figure><img src="${pick.img}" alt="${pick.zh}"></figure><div class="today-copy"><p class="label">VOL. ${pick.v} · PLATE ${pick.p}</p><h3>${pick.zh}</h3><p class="en">${pick.en}</p><p class="latin">${pick.latin||'原书拉丁学名待核'}</p><p>出自《${V[pick.v-1][0]}》，${V[pick.v-1][2]} 年。图像信息、历史名称与现代分类在同一视野中呈现。</p><div class="actions"><button class="btn primary" id="openPick">查看图版</button><a class="btn" href="#/illustrations">浏览全部图版</a></div></div></div></section><section class="section"><div class="section-head"><div><p class="label">FORTY VOLUMES</p><h2>四十卷书架</h2></div><a href="#/volumes">查看目录 →</a></div><div class="shelf">${V.map((v,i)=>`<button class="spine" style="--h:${190+(i*19)%100}px;--c:${['#31584e','#794638','#5b6450','#424d53'][i%4]}" data-v="${i+1}">VOL.${i+1} ${v[0]}</button>`).join('')}</div></section>`;document.querySelectorAll('[data-cat]').forEach(x=>x.onclick=()=>location.hash=`#/illustrations?cat=${x.dataset.cat}`);document.querySelector('#shuffle').onclick=()=>home();document.querySelector('#openPick').onclick=()=>openViewer(plates.indexOf(pick));document.querySelectorAll('[data-v]').forEach(x=>x.onclick=()=>location.hash=`#/illustrations?vol=${x.dataset.v}`)}
function illustrations(){const q=new URLSearchParams((location.hash.split('?')[1]||''));shown=80;app.innerHTML=`<header class="view-title"><p class="label">ILLUSTRATION CABINET</p><h1>全部图版</h1><p>1,347 幅历史动物图版，可筛选、放大并连续浏览。</p></header><div class="toolbar"><input id="search" placeholder="搜索中文名、英文名、卷名…" aria-label="搜索"><select id="cat"><option value="">全部类别</option>${['鸟类','哺乳动物','昆虫','鱼类'].map(c=>`<option ${q.get('cat')==c?'selected':''}>${c}</option>`)}</select><select id="vol"><option value="">全部卷册</option>${V.map((v,i)=>`<option value="${i+1}" ${q.get('vol')==i+1?'selected':''}>VOL.${i+1} ${v[0]}</option>`)}</select><select id="size"><option value="180">紧凑</option><option value="220" selected>标准</option><option value="310">展览</option></select><span class="count" id="count"></span></div><div class="wall" id="wall"></div><button class="btn more" id="more">继续加载</button>`;['search','cat','vol'].forEach(id=>document.querySelector('#'+id).oninput=applyFilters);document.querySelector('#size').oninput=e=>{document.documentElement.style.setProperty('--tile',e.target.value+'px');localStorage.setItem('nl-size',e.target.value)};const saved=localStorage.getItem('nl-size');if(saved){document.querySelector('#size').value=saved;document.documentElement.style.setProperty('--tile',saved+'px')}document.querySelector('#more').onclick=()=>{shown+=80;renderWall()};applyFilters()}
function applyFilters(){const s=document.querySelector('#search').value.toLowerCase(),c=document.querySelector('#cat').value,v=document.querySelector('#vol').value;filtered=plates.filter(p=>(!c||p.cat==c)&&(!v||p.v==v)&&(!s||`${p.zh} ${p.en} ${p.latin} ${V[p.v-1][0]} ${V[p.v-1][1]}`.toLowerCase().includes(s)));shown=80;const qs=new URLSearchParams();if(c)qs.set('cat',c);if(v)qs.set('vol',v);history.replaceState(null,'',`#/illustrations${qs.size?'?'+qs:''}`);renderWall()}
function renderWall(){const wall=document.querySelector('#wall');wall.innerHTML=filtered.slice(0,shown).map((p,i)=>`<button class="plate" data-i="${i}"><div class="mat"><img loading="lazy" src="${p.img}" alt="${p.zh}"></div><h3>${p.zh}</h3><div class="meta">VOL.${p.v} · PLATE ${p.p} · ${p.cat}</div></button>`).join('');document.querySelector('#count').textContent=`显示 ${Math.min(shown,filtered.length)} / ${filtered.length}`;document.querySelector('#more').classList.toggle('hide',shown>=filtered.length);wall.querySelectorAll('.plate').forEach(x=>x.onclick=()=>openViewer(plates.indexOf(filtered[+x.dataset.i])))}
function volumes(){app.innerHTML=`<header class="view-title"><p class="label">THE COMPLETE SET</p><h1>四十卷</h1><p>按 1833—1843 年原始出版顺序排列。</p></header><section class="volume-list">${V.map((v,i)=>`<article class="volume"><small>VOL. ${String(i+1).padStart(2,'0')} · ${v[2]} · ${v[3]}</small><h3>${v[0]}</h3><p class="en">${v[1]}</p><p>${v[4]} 幅图版</p><a href="#/illustrations?vol=${i+1}">进入本卷图版 →</a></article>`).join('')}</section>`}
function about(){app.innerHTML=`<article class="about"><p class="eyebrow">ABOUT & ROADMAP</p><h1>关于项目</h1><p class="lead">这不是现代动物百科，也不是原网站的中文换皮，而是一座把图像、原书文本、中文导读、卷册与历史语境放入同一阅读视野的在线自然史图像博物馆。</p><div class="status"><b>当前公开子页面：</b>已经完成 40 卷、1,347 幅图版的基础索引，以及搜索筛选、尺寸调整、全屏查看和连续浏览。物种中文名、正文译文、42 篇传记、地点关系与现代分类仍处于数据核验和逐卷制作阶段。</div><h2>为什么这样设计</h2><p>核心问题有两个：让 1,347 幅图版更容易发现、筛选、放大和连续浏览；让图像、名称、原书正文、译文、卷册和人物信息能够并读，减少在长页面与不同栏目之间往返。</p><h2>实施规划</h2><div class="roadmap"><section class="phase"><b>01 · DATA</b><h3>数据管线与来源账本</h3><p>校验 40 卷、图版、人物、章节、地点与原始扫描链接；建立稳定 ID、图文映射和许可记录。</p></section><section class="phase"><b>02 · FIRST VOLUME</b><h3>先完成一卷样板</h3><p>以蜂鸟卷建立可复用标准：可靠中文名、历史拉丁名、现代分类注、段落级译文与 OCR 校勘。</p></section><section class="phase"><b>03 · IMAGES</b><h3>本地分级图像资产</h3><p>在许可允许范围内生成 thumbnail、medium、full，减少远程热链并支持放大与比较。</p></section><section class="phase"><b>04 · READING</b><h3>浏览与阅读闭环</h3><p>完善图文同步、卷册三种阅读模式、收藏、历史、稳定深链接和比较模式。</p></section><section class="phase"><b>05 · RELATIONS</b><h3>人物与地点关系网</h3><p>补齐 42 篇人物导读、历史地点、卷册与物种的交叉关联，并明确“原书提及”与现代分布的差别。</p></section><section class="phase"><b>06 · VERIFY</b><h3>全设备验证</h3><p>覆盖桌面、平板和手机的键盘、触摸、缩放、底部抽屉、性能与无障碍测试。</p></section></div><h2>翻译与分类原则</h2><ul><li>可靠现代中文通用名才采用；无法确认时标为“中文名待核”，不虚构名称。</li><li>原书拉丁学名与现代有效学名分开显示，分类变化附克制侧注。</li><li>OCR 不可靠或古旧术语无法确认时保留英文，并标记“原文待校”。</li><li>AI 可辅助提取和初译，但来源、规则校验与尚未人工复核的范围必须具体公开。</li></ul><h2>来源与局限</h2><p>本预览的图像索引来自 Nicholas Rougeux 的 The Naturalist’s Library 数字修复项目；原始扫描将逐卷连接 Internet Archive、Biodiversity Heritage Library 等馆藏。本阶段仍依赖 c82.net 图像地址，尚未完成本地多尺寸资产、全量正文和现代分类核验。</p></article>`}
function openViewer(i){current=i;zoom=1;const p=plates[i];document.querySelector('#viewer').classList.add('open');document.body.style.overflow='hidden';document.querySelector('#viewerImg').src=p.img;document.querySelector('#viewerImg').alt=p.zh;document.querySelector('#viewerImg').style.setProperty('--zoom',1);document.querySelector('#viewerIndex').textContent=`VOL. ${p.v} · PLATE ${p.p} · ${p.cat}`;document.querySelector('#viewerTitle').textContent=p.zh;document.querySelector('#viewerEn').textContent=p.en;document.querySelector('#viewerLatin').textContent=p.latin||'原书拉丁学名待核';document.querySelector('#viewerVolume').textContent=`《${V[p.v-1][0]}》 · ${V[p.v-1][2]}`;document.querySelector('#source').href=p.img;localStorage.setItem('nl-recent',`${p.v}-${p.p}`)}
function closeViewer(){document.querySelector('#viewer').classList.remove('open');document.body.style.overflow=''}document.querySelector('#close').onclick=closeViewer;document.querySelector('#prev').onclick=()=>openViewer((current-1+plates.length)%plates.length);document.querySelector('#next').onclick=()=>openViewer((current+1)%plates.length);document.querySelectorAll('[data-z]').forEach(b=>b.onclick=()=>{zoom=b.dataset.z=='fit'?1:Math.max(.5,Math.min(4,zoom+ +b.dataset.z));document.querySelector('#viewerImg').style.setProperty('--zoom',zoom)});addEventListener('keydown',e=>{if(!document.querySelector('#viewer').classList.contains('open'))return;if(e.key=='Escape')closeViewer();if(e.key=='ArrowLeft')document.querySelector('#prev').click();if(e.key=='ArrowRight')document.querySelector('#next').click()});
function route(){closeViewer();const p=location.hash.split('?')[0]||'#/';if(p=='#/illustrations')illustrations();else if(p=='#/volumes')volumes();else if(p=='#/about')about();else home();scrollTo(0,0)}addEventListener('hashchange',route);route();
</script>
</body></html>
