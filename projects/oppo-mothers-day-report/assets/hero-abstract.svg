<!-- hero-abstract.svg: 抽象主视觉 - 母亲节 + 手机影像 + 舆论波纹 + 平台节点 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="OPPO母亲节文案事件报道封面">
  <title>OPPO母亲节文案事件：传播学案例研究</title>
  <desc>抽象主视觉：母亲节符号、手机影像、舆论波纹、平台节点。设计风格严肃克制，无真实人物照片。</desc>

  <!-- 背景：淡米白 -->
  <rect width="800" height="400" fill="#FAF8F5"/>

  <!-- 核心视觉元素：抽象化的手机轮廓 -->
  <g transform="translate(400, 200)">
    <!-- 手机轮廓（抽象线条） -->
    <rect x="-80" y="-120" width="160" height="260" rx="20" ry="20" fill="none" stroke="#2C2C2C" stroke-width="3"/>
    <!-- 屏幕（影像象征） -->
    <rect x="-70" y="-100" width="140" height="220" rx="8" ry="8" fill="#F0EDE8" stroke="#2C2C2C" stroke-width="1.5"/>

    <!-- 屏幕内的内容：抽象的母亲形象符号 -->
    <!-- 花束线条（代表母亲节） -->
    <g stroke="#8B7355" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="-40" y1="-60" x2="-40" y2="-10"/>
      <circle cx="-40" cy="-65" r="8" fill="#E8D5C4" stroke="#8B7355"/>
      <line x1="-20" y1="-50" x2="-20" y2="-10"/>
      <circle cx="-20" cy="-55" r="8" fill="#E8D5C4" stroke="#8B7355"/>
      <line x1="0" y1="-55" x2="0" y2="-10"/>
      <circle cx="0" cy="-60" r="8" fill="#E8D5C4" stroke="#8B7355"/>
    </g>

    <!-- 手机摄像头（象征记录） -->
    <circle cx="0" cy="-80" r="15" fill="none" stroke="#6B6B6B" stroke-width="2"/>
    <circle cx="0" cy="-80" r="8" fill="#6B6B6B"/>
    <circle cx="0" cy="-80" r="4" fill="#FFFFFF"/>
  </g>

  <!-- 舆论波纹：从手机向外扩散 -->
  <g fill="none" stroke="#C41E3A" stroke-width="1.5" opacity="0.6">
    <circle cx="480" cy="200" r="30" stroke-dasharray="4,3"/>
    <circle cx="480" cy="200" r="60" stroke-dasharray="4,3"/>
    <circle cx="480" cy="200" r="90" stroke-dasharray="4,3"/>
    <circle cx="480" cy="200" r="120" stroke-dasharray="4,3"/>
  </g>
  <!-- 波纹中的节点：象征平台上的声音 -->
  <g fill="#C41E3A">
    <circle cx="510" cy="170" r="4" opacity="0.7"/>
    <circle cx="530" cy="195" r="3" opacity="0.6"/>
    <circle cx="525" cy="225" r="5" opacity="0.8"/>
    <circle cx="545" cy="180" r="3" opacity="0.5"/>
    <circle cx="550" cy="215" r="4" opacity="0.7"/>
    <circle cx="560" cy="195" r="3" opacity="0.6"/>
  </g>

  <!-- 左侧元素：符号矩阵的抽象化表达 -->
  <g transform="translate(80, 200)" opacity="0.4">
    <!-- 抽象线条群（代表符号） -->
    <line x1="-60" y1="-80" x2="60" y2="-80" stroke="#2C2C2C" stroke-width="1.5"/>
    <line x1="-60" y1="-40" x2="60" y2="-40" stroke="#2C2C2C" stroke-width="1.5"/>
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#2C2C2C" stroke-width="1.5"/>
    <line x1="-60" y1="40" x2="60" y2="40" stroke="#2C2C2C" stroke-width="1.5"/>
    <line x1="-60" y1="80" x2="60" y2="80" stroke="#2C2C2C" stroke-width="1.5"/>
  </g>

  <!-- 右侧元素：五层失控模型的可视化 -->
  <g transform="translate(700, 200)" opacity="0.3">
    <rect x="-30" y="-100" width="60" height="20" rx="3" fill="#C41E3A" opacity="0.8"/>
    <rect x="-30" y="-70" width="60" height="20" rx="3" fill="#8B7355" opacity="0.7"/>
    <rect x="-30" y="-40" width="60" height="20" rx="3" fill="#6B6B6B" opacity="0.6"/>
    <rect x="-30" y="-10" width="60" height="20" rx="3" fill="#4A4A4A" opacity="0.5"/>
    <rect x="-30" y="20" width="60" height="20" rx="3" fill="#2C2C2C" opacity="0.4"/>
  </g>

  <!-- 底部：时间线起点标记 -->
  <g transform="translate(400, 360)">
    <circle cx="0" cy="0" r="6" fill="#C41E3A"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="#C41E3A" stroke-width="1" opacity="0.5"/>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#6B6B6B">2026.05.08 — 05.11</text>
  </g>

  <!-- 顶部：标题装饰 -->
  <g transform="translate(400, 50)">
    <line x1="-120" y1="0" x2="-40" y2="0" stroke="#8B7355" stroke-width="1"/>
    <line x1="40" y1="0" x2="120" y2="0" stroke="#8B7355" stroke-width="1"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#8B7355" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="3" fill="#8B7355"/>
  </g>

  <!-- 角落装饰：学术严肃感 -->
  <g stroke="#E8D5C4" stroke-width="1" fill="none">
    <path d="M 20,20 L 20,60 M 20,20 L 60,20"/>
    <path d="M 780,20 L 780,60 M 780,20 L 740,20"/>
    <path d="M 20,380 L 20,340 M 20,380 L 60,380"/>
    <path d="M 780,380 L 780,340 M 780,380 L 740,380"/>
  </g>
</svg>