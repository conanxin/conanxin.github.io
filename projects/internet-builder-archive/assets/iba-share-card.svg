<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#2c5a9e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines for archive feel -->
  <g stroke="#1e2d40" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Archive icon area -->
  <g transform="translate(70, 80)">
    <!-- Folder/archive icon -->
    <rect x="0" y="10" width="60" height="45" rx="4" fill="#2c5a9e" opacity="0.8"/>
    <rect x="0" y="10" width="60" height="14" rx="4" fill="#4a90d9"/>
    <rect x="15" y="3" width="30" height="14" rx="3" fill="#2c5a9e"/>
    <!-- Document lines -->
    <rect x="10" y="30" width="25" height="3" rx="1" fill="#4a90d9" opacity="0.6"/>
    <rect x="10" y="36" width="18" height="3" rx="1" fill="#4a90d9" opacity="0.6"/>
    <rect x="10" y="42" width="22" height="3" rx="1" fill="#4a90d9" opacity="0.6"/>
  </g>

  <!-- Chinese title -->
  <text x="60" y="168" font-family="sans-serif" font-size="72" font-weight="bold" fill="#e8f0fa" filter="url(#glow)">旧互联网建设者资料库</text>

  <!-- English subtitle -->
  <text x="60" y="220" font-family="sans-serif" font-size="28" fill="#6b8cba" letter-spacing="2">Internet Builder Archive</text>

  <!-- Divider line -->
  <rect x="60" y="240" width="400" height="2" fill="url(#accent)" rx="1"/>

  <!-- Description -->
  <text x="60" y="285" font-family="sans-serif" font-size="22" fill="#8ba4c7">视频、访谈、纪录片、公司备忘录与创作者心智的</text>
  <text x="60" y="315" font-family="sans-serif" font-size="22" fill="#8ba4c7">中文化策展资料库</text>

  <!-- Data badges -->
  <g transform="translate(60, 360)">
    <!-- Badge 1: 74 items -->
    <rect x="0" y="0" width="150" height="90" rx="8" fill="#1a2a40" stroke="#2c5a9e" stroke-width="1.5"/>
    <text x="75" y="42" font-family="sans-serif" font-size="36" font-weight="bold" fill="#e8f0fa" text-anchor="middle">74</text>
    <text x="75" y="68" font-family="sans-serif" font-size="14" fill="#6b8cba" text-anchor="middle">items 总条目</text>

    <!-- Badge 2: 64 verified -->
    <rect x="170" y="0" width="150" height="90" rx="8" fill="#1a2a40" stroke="#2c5a9e" stroke-width="1.5"/>
    <text x="245" y="42" font-family="sans-serif" font-size="36" font-weight="bold" fill="#e8f0fa" text-anchor="middle">64</text>
    <text x="245" y="68" font-family="sans-serif" font-size="14" fill="#6b8cba" text-anchor="middle">verified 已策展</text>

    <!-- Badge 3: 31 embeds -->
    <rect x="340" y="0" width="150" height="90" rx="8" fill="#1a2a40" stroke="#2c5a9e" stroke-width="1.5"/>
    <text x="415" y="42" font-family="sans-serif" font-size="36" font-weight="bold" fill="#e8f0fa" text-anchor="middle">31</text>
    <text x="415" y="68" font-family="sans-serif" font-size="14" fill="#6b8cba" text-anchor="middle">embeds 可嵌入</text>

    <!-- Badge 4: 5 pathways -->
    <rect x="510" y="0" width="150" height="90" rx="8" fill="#1a2a40" stroke="#2c5a9e" stroke-width="1.5"/>
    <text x="585" y="42" font-family="sans-serif" font-size="36" font-weight="bold" fill="#e8f0fa" text-anchor="middle">5</text>
    <text x="585" y="68" font-family="sans-serif" font-size="14" fill="#6b8cba" text-anchor="middle">pathways 专题路径</text>
  </g>

  <!-- Bottom URL -->
  <text x="60" y="530" font-family="sans-serif" font-size="20" fill="#4a90d9">conanxin.github.io/projects/internet-builder-archive/</text>

  <!-- Bottom divider -->
  <rect x="0" y="560" width="1200" height="2" fill="#1e2d40"/>

  <!-- Footer note -->
  <text x="60" y="595" font-family="sans-serif" font-size="16" fill="#4a5568">中文化策展索引 · 纯静态 · GitHub Pages 托管</text>

  <!-- Right decorative elements -->
  <g transform="translate(900, 100)" opacity="0.15">
    <circle cx="100" cy="100" r="180" fill="none" stroke="#4a90d9" stroke-width="1"/>
    <circle cx="100" cy="100" r="140" fill="none" stroke="#4a90d9" stroke-width="1"/>
    <circle cx="100" cy="100" r="100" fill="none" stroke="#4a90d9" stroke-width="1"/>
    <line x1="100" y1="-80" x2="100" y2="280" stroke="#4a90d9" stroke-width="1"/>
    <line x1="-80" y1="100" x2="280" y2="100" stroke="#4a90d9" stroke-width="1"/>
    <line x1="-20" y1="-20" x2="220" y2="220" stroke="#4a90d9" stroke-width="1"/>
    <line x1="220" y1="-20" x2="-20" y2="220" stroke="#4a90d9" stroke-width="1"/>
  </g>

  <!-- Pathway pills at bottom right -->
  <g transform="translate(650, 480)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#1a2a40" stroke="#2c5a9e" stroke-width="1"/>
    <text x="60" y="21" font-family="sans-serif" font-size="13" fill="#6b8cba" text-anchor="middle">创始人精神谱系</text>

    <rect x="130" y="0" width="120" height="32" rx="16" fill="#1a2a40" stroke="#2c5a9e" stroke-width="1"/>
    <text x="190" y="21" font-family="sans-serif" font-size="13" fill="#6b8cba" text-anchor="middle">技术与创业史</text>

    <rect x="260" y="0" width="120" height="32" rx="16" fill="#1a2a40" stroke="#2c5a9e" stroke-width="1"/>
    <text x="320" y="21" font-family="sans-serif" font-size="13" fill="#6b8cba" text-anchor="middle">媒体与社会观察</text>

    <rect x="0" y="40" width="120" height="32" rx="16" fill="#1a2a40" stroke="#2c5a9e" stroke-width="1"/>
    <text x="60" y="61" font-family="sans-serif" font-size="13" fill="#6b8cba" text-anchor="middle">创作者心智</text>

    <rect x="130" y="40" width="120" height="32" rx="16" fill="#1a2a40" stroke="#2c5a9e" stroke-width="1"/>
    <text x="190" y="61" font-family="sans-serif" font-size="13" fill="#6b8cba" text-anchor="middle">组织与战略</text>
  </g>
</svg>