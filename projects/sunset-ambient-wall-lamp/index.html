<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#efe7da" />
  <meta name="description" content="An interactive demo of a sunset ambient art wall lamp. Pull the beads to move the sun and warm the room." />
  <title>Sunset Time Ambient Art Wall Lamp</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page" id="page">
    <!-- soft light-warm room with plant silhouette -->
    <div class="room" aria-hidden="true">
      <div class="wall"></div>
      <div class="wall__vignette"></div>
      <div class="plant plant--right"></div>
      <div class="lampGlow" id="lampGlow"></div>
    </div>

    <!-- 1) TOP compact header -->
    <header class="topbar" aria-label="page title">
      <p class="topbar__title">Sunset Time Ambient Art Wall Lamp</p>
      <p class="topbar__subtitle">Pull the beads. Move the sun. Warm the room.</p>
    </header>

    <!-- 2) MIDDLE lamp stage: panel + cords + beads ONLY -->
    <section class="stage" aria-label="Sunset ambient wall lamp simulator">
      <div class="lamp" id="lamp">
        <div class="bracket" aria-hidden="true"></div>

        <div class="panel" id="panel" role="img" aria-label="Square sunset-gradient art panel mounted on a warm wall">
          <div class="panel__sky" id="panelSky"></div>
          <div class="panel__sun" id="panelSun">
            <div class="panel__sunOuter"></div>
            <div class="panel__sunCore"></div>
            <div class="panel__sunHalo"></div>
          </div>
          <div class="panel__horizon"></div>
          <div class="panel__sheen"></div>
          <div class="panel__frame"></div>
          <span class="screw screw--tl" aria-hidden="true"></span>
          <span class="screw screw--tr" aria-hidden="true"></span>
          <span class="screw screw--bl" aria-hidden="true"></span>
          <span class="screw screw--br" aria-hidden="true"></span>
        </div>

        <div class="cords" id="cords" aria-label="Pull cords. Touch and drag a bead downward.">
          <!-- red cord -->
          <div class="cord" data-cord="red">
            <div class="cord__string" id="cordStringRed">
              <svg class="cord__line" viewBox="0 0 20 208" preserveAspectRatio="none" aria-hidden="true">
                <line x1="10" y1="0" x2="10" y2="110" id="cordLineRed" stroke="#1a1310" stroke-width="1.6" stroke-linecap="round" />
              </svg>
            </div>
            <div class="beadHit" id="beadHitRed" role="button" tabindex="0" aria-label="Red bead. Pull down to raise the sun.">
              <span class="bead bead--red" id="beadRed"></span>
            </div>
          </div>

          <!-- black cord -->
          <div class="cord" data-cord="black">
            <div class="cord__string" id="cordStringBlack">
              <svg class="cord__line" viewBox="0 0 20 208" preserveAspectRatio="none" aria-hidden="true">
                <line x1="10" y1="0" x2="10" y2="110" id="cordLineBlack" stroke="#1a1310" stroke-width="1.6" stroke-linecap="round" />
              </svg>
            </div>
            <div class="beadHit" id="beadHitBlack" role="button" tabindex="0" aria-label="Black bead. Pull down to brighten the light.">
              <span class="bead bead--black" id="beadBlack"></span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- 3) BOTTOM control panel: hint, chips, buttons -->
    <section class="control" aria-label="Lamp controls">
      <p class="hint">下拉红色珠子移动太阳，下拉黑色珠子调节光线。</p>

      <div class="chips" id="chips" aria-live="polite">
        <span class="chip">
          <span class="chip__key">Sun Height</span>
          <span class="chip__val" id="readSun">Middle</span>
        </span>
        <span class="chip">
          <span class="chip__key">Glow Level</span>
          <span class="chip__val" id="readGlow">Warm</span>
        </span>
      </div>

      <div class="controls">
        <button class="btn btn--ghost" id="btnReset" type="button">Reset</button>
        <button class="btn btn--primary" id="btnAuto" type="button">Auto Demo</button>
      </div>
    </section>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
