<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <title>妈妈，也有自己的热爱 — 演唱会前的妈妈</title>
  <desc>OPPO母亲节传播重设计海报第一张：展示妈妈在音乐前的期待与热爱</desc>

  <!-- Background -->
  <rect width="1080" height="1440" fill="#FAF8F5"/>

  <!-- Abstract stage lights -->
  <circle cx="200" cy="100" r="180" fill="#FFF5E6" opacity="0.6"/>
  <circle cx="880" cy="150" r="220" fill="#E8F0E8" opacity="0.5"/>
  <circle cx="540" cy="50" r="160" fill="#F0E8F0" opacity="0.4"/>

  <!-- Abstract crowd silhouette (background) -->
  <g opacity="0.08" fill="#2C2C2C">
    <ellipse cx="100" cy="950" rx="80" ry="120"/>
    <ellipse cx="220" cy="960" rx="70" ry="110"/>
    <ellipse cx="350" cy="955" rx="75" ry="115"/>
    <ellipse cx="480" cy="950" rx="70" ry="110"/>
    <ellipse cx="600" cy="960" rx="80" ry="120"/>
    <ellipse cx="730" cy="955" rx="75" ry="115"/>
    <ellipse cx="860" cy="950" rx="70" ry="110"/>
    <ellipse cx="980" cy="960" rx="80" ry="120"/>
  </g>

  <!-- Concert stage (abstract) -->
  <rect x="0" y="600" width="1080" height="500" fill="#1C1C1C" opacity="0.06"/>
  <rect x="0" y="600" width="1080" height="3" fill="#2C2C2C" opacity="0.15"/>

  <!-- Abstract stage lights glow -->
  <ellipse cx="540" cy="580" rx="300" ry="80" fill="#FFE4B5" opacity="0.12"/>
  <ellipse cx="300" cy="550" rx="150" ry="60" fill="#ADD8E6" opacity="0.1"/>
  <ellipse cx="780" cy="560" rx="150" ry="60" fill="#ADD8E6" opacity="0.1"/>

  <!-- Female figure (abstract silhouette) - standing, with headphones -->
  <g transform="translate(480, 580)">
    <!-- Body -->
    <path d="M60,150 C30,150 10,180 10,220 L10,380 C10,410 20,430 40,430 L80,430 C100,430 110,410 110,380 L110,220 C110,180 90,150 60,150 Z" fill="#F5E6D3" opacity="0.85"/>
    <!-- Neck -->
    <rect x="50" y="130" width="20" height="25" fill="#F5E6D3"/>
    <!-- Head -->
    <ellipse cx="60" cy="100" rx="38" ry="42" fill="#F5E6D3"/>
    <!-- Hair -->
    <path d="M22,95 C22,55 60,30 60,30 C60,30 98,55 98,95 C98,100 95,105 92,105 L28,105 C25,105 22,100 22,95 Z" fill="#3C2C2C"/>
    <!-- Headphones -->
    <ellipse cx="60" cy="95" rx="32" ry="25" fill="none" stroke="#2C2C2C" stroke-width="3" opacity="0.4"/>
    <rect x="18" y="88" width="10" height="20" rx="3" fill="#2C2C2C" opacity="0.4"/>
    <rect x="92" y="88" width="10" height="20" rx="3" fill="#2C2C2C" opacity="0.4"/>
    <!-- Face (minimal features) -->
    <ellipse cx="48" cy="98" rx="2" ry="2" fill="#2C2C2C" opacity="0.3"/>
    <ellipse cx="72" cy="98" rx="2" ry="2" fill="#2C2C2C" opacity="0.3"/>
    <!-- Arms -->
    <path d="M10,180 C-10,200 -15,260 -10,300" stroke="#F5E6D3" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M110,180 C130,200 135,260 130,300" stroke="#F5E6D3" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Holding ticket in hand -->
    <rect x="110" y="290" width="35" height="22" rx="3" fill="#E8D4B8" transform="rotate(15, 110, 300)"/>
    <!-- Legs -->
    <rect x="25" y="425" width="22" height="100" rx="5" fill="#D4C4B0"/>
    <rect x="73" y="425" width="22" height="100" rx="5" fill="#D4C4B0"/>
  </g>

  <!-- Ticket near figure -->
  <g transform="translate(620, 870) rotate(12)">
    <rect width="70" height="38" rx="4" fill="#F5E0C0" opacity="0.9"/>
    <text x="35" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B5B4D" opacity="0.7">LIVE</text>
    <line x1="0" y1="10" x2="70" y2="10" stroke="#D4C4A8" stroke-width="1"/>
    <line x1="0" y1="28" x2="70" y2="28" stroke="#D4C4A8" stroke-width="1"/>
  </g>

  <!-- Small bag -->
  <g transform="translate(580, 920)">
    <rect width="40" height="55" rx="6" fill="#C4A882" opacity="0.7"/>
    <path d="M5,0 Q20,-20 35,0" stroke="#A08060" stroke-width="2" fill="none"/>
  </g>

  <!-- OPPO phone (abstract, small, in scene) -->
  <g transform="translate(680, 950)">
    <rect width="28" height="50" rx="4" fill="#1C1C1C" opacity="0.15"/>
    <rect x="2" y="2" width="24" height="46" rx="3" fill="#2C2C2C" opacity="0.1"/>
  </g>

  <!-- Floating musical notes (abstract) -->
  <text x="300" y="500" font-family="Georgia, serif" font-size="28" fill="#8B7355" opacity="0.18">♪</text>
  <text x="760" y="480" font-family="Georgia, serif" font-size="36" fill="#8B7355" opacity="0.15">♫</text>
  <text x="180" y="650" font-family="Georgia, serif" font-size="24" fill="#8B7355" opacity="0.12">♪</text>
  <text x="880" y="700" font-family="Georgia, serif" font-size="20" fill="#8B7355" opacity="0.1">♩</text>
  <text x="450" y="450" font-family="Georgia, serif" font-size="30" fill="#8B7355" opacity="0.13">♬</text>

  <!-- Main text area -->
  <rect x="60" y="1150" width="960" height="220" rx="8" fill="#FAF8F5" opacity="0.92"/>

  <!-- Main headline -->
  <text x="540" y="1205" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="600" fill="#2C2C2C" letter-spacing="0">
    她也会为一段旋律，
  </text>
  <text x="540" y="1268" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="600" fill="#2C2C2C" letter-spacing="0">
    安静地认真很久。
  </text>

  <!-- Sub text -->
  <text x="540" y="1320" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" fill="#6B6B6B" letter-spacing="1">
    妈妈的热爱，不需要被解释，只需要被看见。
  </text>

  <!-- Brand / theme tag -->
  <text x="540" y="1380" text-anchor="middle" font-family="system-ui, 'PingFang SC', sans-serif" font-size="18" fill="#A09080" letter-spacing="3">
    OPPO · 母亲节特别呈现
  </text>

  <!-- Bottom disclaimer -->
  <rect x="0" y="1400" width="1080" height="40" fill="#2C2C2C" opacity="0.04"/>
  <text x="540" y="1425" text-anchor="middle" font-family="system-ui, 'PingFang SC', sans-serif" font-size="13" fill="#8B7355" opacity="0.7" letter-spacing="2">
    母亲节传播重设计研究稿｜非官方发布物 · 记录她自己的热爱
  </text>

</svg>
