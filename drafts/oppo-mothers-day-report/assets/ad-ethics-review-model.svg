<!-- ad-ethics-review-model.svg: 广告创意四重审核模型 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="广告创意四重审核模型">
  <title>广告创意四重审核模型</title>
  <desc>本页面提出的广告内容审核框架，用于品牌发布前的自查指南</desc>

  <rect width="800" height="320" fill="#FAF8F5"/>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#2C2C2C">广告创意四重审核模型</text>

  <!-- 四个审核维度 -->
  <!-- 维度1: 事实审核 -->
  <g transform="translate(100, 120)">
    <rect x="-85" y="-50" width="170" height="100" rx="8" fill="#F0F5E8" stroke="#4A7C59" stroke-width="2"/>
    <circle cx="0" cy="-30" r="20" fill="#4A7C59"/>
    <text x="0" y="-26" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">1</text>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C2C2C">事实审核</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">内容中的事实陈述</text>
    <text x="0" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">是否准确？数据</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">是否真实？</text>
  </g>

  <!-- 维度2: 法务审核 -->
  <g transform="translate(300, 120)">
    <rect x="-85" y="-50" width="170" height="100" rx="8" fill="#F0EDE8" stroke="#8B7355" stroke-width="2"/>
    <circle cx="0" cy="-30" r="20" fill="#8B7355"/>
    <text x="0" y="-26" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">2</text>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C2C2C">法务审核</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">是否违反法律法规？</text>
    <text x="0" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">是否涉及歧视或</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">不正当竞争？</text>
  </g>

  <!-- 维度3: 舆情审核 -->
  <g transform="translate(500, 120)">
    <rect x="-85" y="-50" width="170" height="100" rx="8" fill="#FFF5F5" stroke="#C41E3A" stroke-width="2"/>
    <circle cx="0" cy="-30" r="20" fill="#C41E3A"/>
    <text x="0" y="-26" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">3</text>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C2C2C">舆情审核</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">可能引发什么情绪</text>
    <text x="0" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">反应？不同群体的</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">解读是否存在风险？</text>
  </g>

  <!-- 维度4: 伦理审核 -->
  <g transform="translate(700, 120)">
    <rect x="-85" y="-50" width="170" height="100" rx="8" fill="#F0EDE8" stroke="#6B6B6B" stroke-width="2"/>
    <circle cx="0" cy="-30" r="20" fill="#6B6B6B"/>
    <text x="0" y="-26" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">4</text>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#2C2C2C">伦理审核</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">是否符合社会主流</text>
    <text x="0" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">价值观？是否尊重</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">目标受众情感？</text>
  </g>

  <!-- 底部：OPPO事件适用说明 -->
  <g transform="translate(400, 250)">
    <rect x="-300" y="-25" width="600" height="50" rx="5" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="0" y="-8" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C41E3A">OPPO事件适用分析</text>
    <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C2C2C">OPPO事件在第一层（事实）无问题，在第二层（法务）可能存在边界争议，</text>
    <text x="0" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C2C2C">但在第三层（舆情）和第四层（伦理）上暴露出了风险识别缺口，未能识别「老公」符号的语境风险。</text>
  </g>
</svg>