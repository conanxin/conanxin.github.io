<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#2d55a7"><title>250 / 250：美国如何成为美国</title><style>body{margin:0;background:#2d55a7;color:white;font:16px system-ui;display:grid;place-items:center;min-height:100vh}p{letter-spacing:.08em}</style></head><body><p>正在打开 250 本书的阅读房间……</p><script>const f=["chunks/00.txt","chunks/01.txt","chunks/02.txt","chunks/03.txt","chunks/04.txt","chunks/05.txt","chunks/06.txt","chunks/07.txt","chunks/08.txt","chunks/09.txt","chunks/10.txt","chunks/11.txt","chunks/12.txt","chunks/13.txt","chunks/14.txt","chunks/15.txt","chunks/16.txt","chunks/17.txt","chunks/18.txt","chunks/19.txt"];(async()=>{const p=(await Promise.all(f.map(x=>fetch(x).then(r=>{if(!r.ok)throw Error(x);return r.text()})))).join("");const b=Uint8Array.from(atob(p),c=>c.charCodeAt(0));const s=new Blob([b]).stream().pipeThrough(new DecompressionStream("gzip"));const h=await new Response(s).text();document.open();document.write(h);document.close()})().catch(e=>{document.body.innerHTML='<main style="padding:40px"><h1>页面加载失败</h1><p>'+e+'</p></main>'});</script></body></html>
