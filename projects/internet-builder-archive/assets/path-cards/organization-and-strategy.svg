<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1c40f"/>
      <stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g stroke="#1e2d40" stroke-width="1" opacity="0.6">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Memo / document icon -->
  <g transform="translate(70, 78)">
    <rect x="0" y="0" width="55" height="65" rx="5" fill="#1a2a40" stroke="#f1c40f" stroke-width="2"/>
    <rect x="8" y="12" width="30" height="4" rx="2" fill="#f1c40f" opacity="0.7"/>
    <rect x="8" y="22" width="38" height="3" rx="1" fill="#f1c40f" opacity="0.5"/>
    <rect x="8" y="30" width="25" height="3" rx="1" fill="#f1c40f" opacity="0.5"/>
    <rect x="8" y="38" width="35" height="3" rx="1" fill="#f1c40f" opacity="0.5"/>
    <rect x="8" y="46" width="20" height="3" rx="1" fill="#f1c40f" opacity="0.5"/>
    <rect x="8" y="54" width="30" height="3" rx="1" fill="#f1c40f" opacity="0.5"/>
  </g>

  <text x="60" y="168" font-family="sans-serif" font-size="42" font-weight="bold" fill="#e8f0fa" filter="url(#glow)">旧互联网建设者资料库</text>
  <text x="60" y="215" font-family="sans-serif" font-size="22" fill="#8ba4c7" letter-spacing="2">Internet Builder Archive</text>

  <rect x="60" y="235" width="500" height="2" fill="url(#accent)" rx="1"/>

  <text x="60" y="295" font-family="sans-serif" font-size="54" font-weight="bold" fill="#f1c40f">组织备忘录与战略转折</text>
  <text x="60" y="340" font-family="sans-serif" font-size="24" fill="#e67e22">Organization &amp; Strategy Memos</text>

  <text x="60" y="385" font-family="sans-serif" font-size="20" fill="#8ba4c7">通过公司 memo 与商业案例理解战略判断、</text>
  <text x="60" y="415" font-family="sans-serif" font-size="20" fill="#8ba4c7">组织文化、平台选择与增长伦理。</text>

  <g transform="translate(60, 445)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#1a2a40" stroke="#f1c40f" stroke-width="1.5"/>
    <text x="70" y="32" font-family="sans-serif" font-size="32" font-weight="bold" fill="#f1c40f" text-anchor="middle">7</text>
    <text x="70" y="55" font-family="sans-serif" font-size="14" fill="#8ba4c7" text-anchor="middle">items</text>
  </g>

  <g transform="translate(220, 445)">
    <rect x="0" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#f1c40f" stroke-width="1"/>
    <text x="35" y="23" font-family="sans-serif" font-size="14" fill="#f1c40f" text-anchor="middle">战略</text>

    <rect x="80" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#f1c40f" stroke-width="1"/>
    <text x="115" y="23" font-family="sans-serif" font-size="14" fill="#f1c40f" text-anchor="middle">组织</text>

    <rect x="160" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#f1c40f" stroke-width="1"/>
    <text x="195" y="23" font-family="sans-serif" font-size="14" fill="#f1c40f" text-anchor="middle">备忘录</text>

    <rect x="240" y="0" width="80" height="34" rx="17" fill="#1a2a40" stroke="#f1c40f" stroke-width="1"/>
    <text x="280" y="23" font-family="sans-serif" font-size="14" fill="#f1c40f" text-anchor="middle">增长伦理</text>
  </g>

  <rect x="0" y="560" width="1200" height="2" fill="#1e2d40"/>
  <text x="60" y="595" font-family="sans-serif" font-size="20" fill="#f1c40f">conanxin.github.io/projects/internet-builder-archive/</text>

  <g transform="translate(920, 100)" opacity="0.12">
    <circle cx="100" cy="100" r="180" fill="none" stroke="#f1c40f" stroke-width="1"/>
    <circle cx="100" cy="100" r="140" fill="none" stroke="#f1c40f" stroke-width="1"/>
    <circle cx="100" cy="100" r="100" fill="none" stroke="#f1c40f" stroke-width="1"/>
  </g>
</svg>