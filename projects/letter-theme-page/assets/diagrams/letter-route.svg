<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" fill="none" role="img" aria-label="抽象信件路线：从故乡到远方的波浪线、虚线、信封与邮戳">
  <defs>
    <linearGradient id="seaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A6FA5" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#2E8B8B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C4A35A" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- 背景波浪层 -->
  <path d="M0 180 Q100 140 200 170 T400 160 T600 175 T800 150" stroke="url(#seaGrad)" stroke-width="48" fill="none" opacity="0.6"/>
  <path d="M0 210 Q120 250 240 220 T480 235 T720 210 T800 230" stroke="#4A6FA5" stroke-width="1.5" fill="none" opacity="0.2" stroke-dasharray="8 6"/>
  <path d="M0 130 Q150 100 300 120 T600 105 T800 115" stroke="#C4A35A" stroke-width="1" fill="none" opacity="0.25" stroke-dasharray="4 8"/>

  <!-- 主路线：虚线弧线 -->
  <path id="mainRoute" d="M80 200 C200 120 350 80 500 110 S700 180 720 140" stroke="#4A6FA5" stroke-width="2" fill="none" stroke-dasharray="6 4" opacity="0.7"/>

  <!-- 起点：故乡 -->
  <g transform="translate(80, 200)">
    <circle r="18" fill="#F7F5F0" stroke="#4A6FA5" stroke-width="1.5"/>
    <circle r="6" fill="#4A6FA5" opacity="0.2"/>
    <circle r="2.5" fill="#4A6FA5"/>
    <text x="0" y="38" text-anchor="middle" font-size="11" fill="#6B6B6B" font-family="Georgia, serif">故 乡</text>
  </g>

  <!-- 终点：远方 -->
  <g transform="translate(720, 140)">
    <circle r="18" fill="#F7F5F0" stroke="#C4A35A" stroke-width="1.5"/>
    <circle r="6" fill="#C4A35A" opacity="0.2"/>
    <circle r="2.5" fill="#C4A35A"/>
    <text x="0" y="38" text-anchor="middle" font-size="11" fill="#6B6B6B" font-family="Georgia, serif">远 方</text>
  </g>

  <!-- 途中信封 1 -->
  <g transform="translate(260, 135) rotate(-8)">
    <rect x="-12" y="-8" width="24" height="16" rx="2" fill="#fff" stroke="#4A6FA5" stroke-width="1.2" filter="url(#softShadow)"/>
    <path d="M-12 -4l12 7 12-7" stroke="#4A6FA5" stroke-width="0.8" fill="none"/>
  </g>

  <!-- 途中信封 2 -->
  <g transform="translate(440, 155) rotate(5)">
    <rect x="-10" y="-7" width="20" height="14" rx="1.5" fill="#fff" stroke="#2E8B8B" stroke-width="1.2" filter="url(#softShadow)"/>
    <path d="M-10 -3l10 6 10-6" stroke="#2E8B8B" stroke-width="0.8" fill="none"/>
  </g>

  <!-- 途中信封 3 -->
  <g transform="translate(580, 165) rotate(-3)">
    <rect x="-9" y="-6" width="18" height="12" rx="1.5" fill="#fff" stroke="#C4A35A" stroke-width="1.2" filter="url(#softShadow)"/>
    <path d="M-9 -2l9 5 9-5" stroke="#C4A35A" stroke-width="0.8" fill="none"/>
  </g>

  <!-- 邮戳装饰 1 -->
  <g transform="translate(340, 200)" opacity="0.25">
    <circle r="22" stroke="#B85C50" stroke-width="1" fill="none" stroke-dasharray="3 2"/>
    <circle r="16" stroke="#B85C50" stroke-width="0.8" fill="none"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#B85C50" stroke-width="0.6"/>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#B85C50" stroke-width="0.6"/>
  </g>

  <!-- 邮戳装饰 2 -->
  <g transform="translate(620, 110)" opacity="0.2">
    <circle r="18" stroke="#4A6FA5" stroke-width="1" fill="none" stroke-dasharray="2 3"/>
    <circle r="13" stroke="#4A6FA5" stroke-width="0.6" fill="none"/>
  </g>

  <!-- 小圆点标记路线节点 -->
  <circle cx="200" cy="155" r="2.5" fill="#4A6FA5" opacity="0.4"/>
  <circle cx="360" cy="145" r="2.5" fill="#2E8B8B" opacity="0.4"/>
  <circle cx="520" cy="135" r="2.5" fill="#C4A35A" opacity="0.4"/>
  <circle cx="660" cy="150" r="2.5" fill="#B85C50" opacity="0.4"/>

  <!-- 底部装饰文字 -->
  <text x="400" y="285" text-anchor="middle" font-size="10" fill="#9B9B9B" font-family="Georgia, serif" letter-spacing="0.15em" opacity="0.5">A L E T T E R ' S  J O U R N E Y</text>
</svg>