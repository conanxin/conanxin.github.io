<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PDF to Markdown</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    max-width: 760px; margin: 0 auto; padding: 40px 24px;
    background: #fafaf8; color: #24292f; line-height: 1.6;
  }
  header { margin-bottom: 36px; }
  header h1 { font-size: 1.6em; font-weight: 600; margin: 0 0 6px 0; color: #1a1a1a; }
  header .subtitle { color: #656d76; font-size: 0.95em; margin: 0 0 10px 0; }
  header .status { display: inline-block; font-size: 0.75em; padding: 3px 10px; border-radius: 12px; background: #ddf4ff; color: #0969da; font-weight: 500; }
  nav { margin-bottom: 28px; font-size: 0.88em; }
  nav a { color: #0969da; text-decoration: none; margin-right: 14px; }
  nav a:hover { text-decoration: underline; }
  nav .sep { color: #d0d7de; margin: 0 2px; }
  .items { margin-top: 8px; }
  .item {
    background: #fff; border: 1px solid #d8dee4; border-radius: 8px;
    padding: 20px 24px; margin-bottom: 16px;
    transition: border-color 0.15s;
  }
  .item:hover { border-color: #8db5e8; }
  .item-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .tag { font-size: 0.72em; padding: 2px 8px; border-radius: 10px; background: #dafbe1; color: #1a7f37; font-weight: 500; }
  .pages { font-size: 0.72em; color: #8b949e; }
  .item h3 { margin: 0 0 6px 0; font-size: 1.05em; font-weight: 600; }
  .item h3 a { color: #24292f; text-decoration: none; }
  .item h3 a:hover { color: #0969da; }
  .item .desc { color: #57606a; font-size: 0.88em; margin-bottom: 10px; line-height: 1.5; }
  .resources { display: flex; gap: 6px; flex-wrap: wrap; }
  .resources a {
    display: inline-block; font-size: 0.8em; padding: 4px 12px;
    border: 1px solid #d0d7de; border-radius: 6px; color: #24292f;
    text-decoration: none; background: #f6f8fa;
  }
  .resources a:hover { background: #eef1f5; border-color: #8db5e8; color: #0969da; }
  footer {
    margin-top: 40px; padding-top: 16px; border-top: 1px solid #d8dee4;
    font-size: 0.8em; color: #8b949e; line-height: 1.6;
  }
</style>
</head>
<body>
<header>
  <h1>PDF to Markdown</h1>
  <p class="subtitle">A small project to turn PDF documents into accessible, searchable online resources — HTML, Markdown, and Text.</p>
  <span class="status">v1 first public release</span>
</header>
<nav>
  <a href="../">Projects</a>
  <span class="sep">/</span>
  <a href="about.html">About</a>
  <span class="sep">/</span>
  <a href="methodology.html">Methodology</a>
</nav>
<div class="items" id="items"></div>
<footer>
  Current public collection includes digital documents only. Scanned document pipeline is being refined separately.
</footer>
<script>
fetch("items.json").then(function(r){return r.json();}).then(function(items){
  var c = document.getElementById("items");
  items.forEach(function(it){
    var base = it.entry.replace("/index.html","");
    var d = document.createElement("div");
    d.className = "item";
    d.innerHTML = '<div class="item-top"><span class="tag">digital</span><span class="pages">'+it.pages+' pages</span></div>'+
      '<h3><a href="'+it.entry+'">'+it.title+'</a></h3>'+
      '<div class="desc">'+it.summary_short+'</div>'+
      '<div class="resources"><a href="'+it.entry+'">HTML</a><a href="'+base+'/sample.md">Markdown</a><a href="'+base+'/extracted.txt">Text</a></div>';
    c.appendChild(d);
  });
});
</script>
</body>
</html>
