<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <defs>
    <style>
      
  .bg { fill: #f7f4ee; }
  .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; font-weight: 700; }
  .body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .url { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .accent-red { fill: #c25e5e; }
  .accent-blue { fill: #4a6fa5; }
  .accent-green { fill: #4a7c59; }
  .ink { fill: #2a2520; }
  .ink-secondary { fill: #5a544d; }
  .ink-tertiary { fill: #8a837a; }

    </style>
  </defs>
  <rect class="bg" width="1200" height="1600"/>
  
  <!-- Title -->
  <text x="600" y="220" text-anchor="middle" class="title" font-size="48" fill="#2a2520">从《给阿嬷的情书》</text>
  <text x="600" y="285" text-anchor="middle" class="title" font-size="48" fill="#2a2520">到世界文学电影</text>
  <rect x="500" y="310" width="200" height="3" fill="#c25e5e" opacity="0.4"/>
  
  <!-- Radiating connections illustration -->
  <g transform="translate(600, 680)">
    <!-- Center node -->
    <circle r="60" fill="#fff" stroke="#c25e5e" stroke-width="2.5" opacity="0.9"/>
    <text y="5" text-anchor="middle" class="body" font-size="14" fill="#2a2520">给阿嬷的</text>
    <text y="22" text-anchor="middle" class="body" font-size="14" fill="#2a2520">情书</text>
    
    <!-- Surrounding nodes -->
    <g transform="rotate(0) translate(0, -220)">
      <circle r="45" fill="#fff" stroke="#4a6fa5" stroke-width="2" opacity="0.85"/>
      <text y="5" text-anchor="middle" class="body" font-size="13" fill="#2a2520">电影</text>
      <line x1="0" y1="45" x2="0" y2="160" stroke="#4a6fa5" stroke-width="1.5" opacity="0.3"/>
    </g>
    <g transform="rotate(51) translate(0, -220)">
      <circle r="45" fill="#fff" stroke="#4a6fa5" stroke-width="2" opacity="0.85"/>
      <text y="5" text-anchor="middle" class="body" font-size="13" fill="#2a2520">文学</text>
      <line x1="0" y1="45" x2="0" y2="160" stroke="#4a6fa5" stroke-width="1.5" opacity="0.3"/>
    </g>
    <g transform="rotate(103) translate(0, -220)">
      <circle r="45" fill="#fff" stroke="#4a7c59" stroke-width="2" opacity="0.85"/>
      <text y="5" text-anchor="middle" class="body" font-size="13" fill="#2a2520">动画</text>
      <line x1="0" y1="45" x2="0" y2="160" stroke="#4a7c59" stroke-width="1.5" opacity="0.3"/>
    </g>
    <g transform="rotate(154) translate(0, -220)">
      <circle r="45" fill="#fff" stroke="#4a7c59" stroke-width="2" opacity="0.85"/>
      <text y="5" text-anchor="middle" class="body" font-size="13" fill="#2a2520">戏剧</text>
      <line x1="0" y1="45" x2="0" y2="160" stroke="#4a7c59" stroke-width="1.5" opacity="0.3"/>
    </g>
    <g transform="rotate(206) translate(0, -220)">
      <circle r="45" fill="#fff" stroke="#c25e5e" stroke-width="2" opacity="0.85"/>
      <text y="5" text-anchor="middle" class="body" font-size="13" fill="#2a2520">散文</text>
      <line x1="0" y1="45" x2="0" y2="160" stroke="#c25e5e" stroke-width="1.5" opacity="0.3"/>
    </g>
    <g transform="rotate(257) translate(0, -220)">
      <circle r="45" fill="#fff" stroke="#c25e5e" stroke-width="2" opacity="0.85"/>
      <text y="5" text-anchor="middle" class="body" font-size="13" fill="#2a2520">档案</text>
      <line x1="0" y1="45" x2="0" y2="160" stroke="#c25e5e" stroke-width="1.5" opacity="0.3"/>
    </g>
    <g transform="rotate(309) translate(0, -220)">
      <circle r="45" fill="#fff" stroke="#4a6fa5" stroke-width="2" opacity="0.85"/>
      <text y="5" text-anchor="middle" class="body" font-size="13" fill="#2a2520">纪录片</text>
      <line x1="0" y1="45" x2="0" y2="160" stroke="#4a6fa5" stroke-width="1.5" opacity="0.3"/>
    </g>
  </g>
  
  <!-- Body text -->
  <text x="600" y="1060" text-anchor="middle" class="body" font-size="30" fill="#5a544d">从侨批出发，</text>
  <text x="600" y="1110" text-anchor="middle" class="body" font-size="30" fill="#5a544d">重读电影、文学、动画、戏剧</text>
  <text x="600" y="1160" text-anchor="middle" class="body" font-size="30" fill="#5a544d">与真实档案中的写信场景。</text>
  
  <!-- Bottom URL -->
  <text x="600" y="1480" text-anchor="middle" class="url" font-size="20" fill="#8a837a">conanxin.github.io/projects/letter-theme-page</text>
  
  <rect x="100" y="1520" width="1000" height="2" fill="#d4cfc7" opacity="0.4"/>
</svg>