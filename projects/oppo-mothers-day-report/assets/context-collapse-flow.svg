<!-- context-collapse-flow.svg: 语境转换失败流程图 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" role="img" aria-label="语境坍塌流程图">
  <title>语境转换失败：从圈层玩笑到公共伦理场景</title>
  <desc>展示'老公'符号从饭圈内部到母亲节广告场景的语境坍塌过程</desc>

  <rect width="800" height="300" fill="#FAF8F5"/>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#2C2C2C">语境转换失败：从圈层话语到公共伦理场景</text>

  <!-- 阶段1: 圈内玩笑 -->
  <g transform="translate(80, 100)">
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="#F0EDE8" stroke="#8B7355" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B7355">阶段一</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C">圈内玩笑</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">粉丝圈内部</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">'老公'=偶像昵称</text>
  </g>
  <!-- 箭头1 -->
  <g transform="translate(160, 100)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#6B6B6B" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="50,-6 60,0 50,6" fill="#6B6B6B"/>
  </g>

  <!-- 阶段2: 商业广告 -->
  <g transform="translate(250, 100)">
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="#F0EDE8" stroke="#6B6B6B" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#6B6B6B">阶段二</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C">商业广告</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">母亲节物料</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">'老公'=婚姻联想?</text>
  </g>
  <!-- 箭头2 -->
  <g transform="translate(330, 100)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#6B6B6B" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="50,-6 60,0 50,6" fill="#6B6B6B"/>
  </g>

  <!-- 阶段3: 公共伦理场景 -->
  <g transform="translate(420, 100)">
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="#F0EDE8" stroke="#C41E3A" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C41E3A">阶段三</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C">公共伦理场景</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#C41E3A">母亲节+公众平台</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#C41E3A">'老公'=婚姻不忠?</text>
  </g>
  <!-- 箭头3 -->
  <g transform="translate(500, 100)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#C41E3A" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="50,-6 60,0 50,6" fill="#C41E3A"/>
  </g>

  <!-- 阶段4: 家庭伦理解读 -->
  <g transform="translate(590, 100)">
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="#FFF5F5" stroke="#C41E3A" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#C41E3A">阶段四</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C">家庭伦理解读</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">婚姻伦理被挑战</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B0000">母亲形象被调侃</text>
  </g>
  <!-- 箭头4 -->
  <g transform="translate(670, 100)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="#8B0000" stroke-width="1.5" stroke-dasharray="4,2"/>
    <polygon points="50,-6 60,0 50,6" fill="#8B0000"/>
  </g>

  <!-- 阶段5: 舆论反弹 -->
  <g transform="translate(750, 100)">
    <rect x="-60" y="-40" width="110" height="80" rx="8" fill="#FFE4E4" stroke="#8B0000" stroke-width="2"/>
    <text x="0" y="-15" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#8B0000">阶段五</text>
    <text x="0" y="5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C">舆论反弹</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">大规模批评</text>
    <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B0000">品牌危机</text>
  </g>

  <!-- 关键洞察 -->
  <g transform="translate(400, 220)">
    <rect x="-280" y="-25" width="560" height="50" rx="5" fill="#FFF5F5" stroke="#C41E3A" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C41E3A">关键洞察</text>
    <text x="0" y="12" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C2C2C">符号的意义由解码者决定，而非编码者意图。当圈层符号进入公共话语场，</text>
    <text x="0" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C2C2C">其意义由更广泛的解码社群重新协商，原有的玩笑语境被完全覆盖。</text>
  </g>
</svg>