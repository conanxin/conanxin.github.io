<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <title>妈妈，也有自己的热爱 — 朋友聚会中的妈妈</title>
  <desc>OPPO母亲节传播重设计海报第五张：展示妈妈和朋友在一起的欢乐时刻</desc>

  <!-- Background: warm indoor setting -->
  <rect width="1080" height="1440" fill="#F8F0E8"/>

  <!-- Wall pattern (subtle) -->
  <g opacity="0.04" stroke="#8B7355" stroke-width="1" fill="none">
    <line x1="0" y1="200" x2="1080" y2="200"/>
    <line x1="0" y1="400" x2="1080" y2="400"/>
    <line x1="0" y1="600" x2="1080" y2="600"/>
    <line x1="0" y1="800" x2="1080" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="1100"/>
    <line x1="400" y1="0" x2="400" y2="1100"/>
    <line x1="600" y1="0" x2="600" y2="1100"/>
    <line x1="800" y1="0" x2="800" y2="1100"/>
  </g>

  <!-- Warm ambient glow -->
  <ellipse cx="540" cy="600" rx="500" ry="350" fill="#FFE8C8" opacity="0.2"/>

  <!-- Abstract window with warm light -->
  <rect x="80" y="80" width="280" height="350" rx="6" fill="#FFF8F0" opacity="0.5"/>
  <rect x="80" y="80" width="280" height="350" rx="6" fill="none" stroke="#D8C8B0" stroke-width="2" opacity="0.3"/>
  <line x1="220" y1="80" x2="220" y2="430" stroke="#D8C8B0" stroke-width="1.5" opacity="0.3"/>
  <line x1="80" y1="255" x2="360" y2="255" stroke="#D8C8B0" stroke-width="1.5" opacity="0.3"/>
  <!-- Curtain -->
  <path d="M70,75 Q75,255 70,435" stroke="#E8D0B8" stroke-width="20" fill="none" opacity="0.2"/>
  <path d="M370,75 Q365,255 370,435" stroke="#E8D0B8" stroke-width="20" fill="none" opacity="0.2"/>

  <!-- Plant near window -->
  <g transform="translate(380, 280)">
    <rect width="40" height="55" rx="5" fill="#C4A080" opacity="0.5"/>
    <ellipse cx="20" cy="10" rx="30" ry="25" fill="#7BAF78" opacity="0.5"/>
    <ellipse cx="10" cy="0" rx="20" ry="18" fill="#8BC888" opacity="0.4"/>
    <ellipse cx="35" cy="5" rx="18" ry="15" fill="#6B9F68" opacity="0.4"/>
  </g>

  <!-- Coffee table with cups -->
  <g transform="translate(280, 850)">
    <rect x="0" y="0" width="520" height="15" rx="4" fill="#8B6040" opacity="0.5"/>
    <rect x="30" y="15" width="15" height="80" fill="#6B4828" opacity="0.4"/>
    <rect x="475" y="15" width="15" height="80" fill="#6B4828" opacity="0.4"/>
  </g>

  <!-- Coffee cups on table -->
  <g transform="translate(320, 800)">
    <ellipse cx="20" cy="8" rx="18" ry="6" fill="#E8DCD0" opacity="0.8"/>
    <path d="M2,8 C2,35 8,48 20,48 C32,48 38,35 38,8" fill="#F0E8E0" opacity="0.7"/>
  </g>
  <g transform="translate(430, 805)">
    <ellipse cx="20" cy="8" rx="18" ry="6" fill="#E8DCD0" opacity="0.8"/>
    <path d="M2,8 C2,35 8,48 20,48 C32,48 38,35 38,8" fill="#F0E8E0" opacity="0.7"/>
  </g>
  <g transform="translate(540, 802)">
    <ellipse cx="20" cy="8" rx="18" ry="6" fill="#E8DCD0" opacity="0.8"/>
    <path d="M2,8 C2,35 8,48 20,48 C32,48 38,35 38,8" fill="#F0E8E0" opacity="0.7"/>
  </g>

  <!-- Three women seated, laughing (abstract silhouettes) -->

  <!-- Woman 1 (left, in profile/3-quarter view, laughing) -->
  <g transform="translate(160, 500)">
    <!-- Body -->
    <path d="M40,130 C15,135 8,170 12,220 L15,350 L80,350 L85,220 C88,170 80,135 55,130 Z" fill="#E8C0A0" opacity="0.8"/>
    <!-- Neck -->
    <rect x="38" y="105" width="18" height="28" fill="#F5E6D3"/>
    <!-- Head (slightly turned) -->
    <ellipse cx="48" cy="82" rx="32" ry="35" fill="#F5E6D3"/>
    <!-- Hair -->
    <path d="M16,72 C10,35 48,15 48,15 C48,15 86,35 80,72 C78,78 75,82 73,82 L23,82 C21,82 18,78 16,72 Z" fill="#3A2A1A"/>
    <!-- Face (laughing, eyes closed) -->
    <path d="M35,82 Q38,78 41,82" stroke="#3A2A1A" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M55,82 Q58,78 61,82" stroke="#3A2A1A" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M42,92 Q48,98 54,92" stroke="#C08080" stroke-width="1.5" fill="none" opacity="0.3"/>
    <!-- Arm (talking gesture) -->
    <path d="M12,165 C-15,190 -10,240 15,270" stroke="#F5E6D3" stroke-width="14" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Woman 2 (center, main figure - more prominent) -->
  <g transform="translate(430, 470)">
    <!-- Body -->
    <path d="M50,140 C20,148 12,185 16,240 L20,370 L90,370 L95,240 C98,185 90,148 60,140 Z" fill="#B8D8E8" opacity="0.8"/>
    <!-- Neck -->
    <rect x="45" y="112" width="20" height="30" fill="#F5E6D3"/>
    <!-- Head (facing forward, big smile) -->
    <ellipse cx="55" cy="85" rx="38" ry="40" fill="#F5E6D3"/>
    <!-- Hair -->
    <path d="M17,75 C10,32 55,8 55,8 C55,8 100,32 93,75 C91,82 88,88 85,88 L25,88 C22,88 19,82 17,75 Z" fill="#4A3020"/>
    <!-- Face (open smile, laughing openly) -->
    <ellipse cx="42" cy="82" rx="3" ry="3" fill="#4A3020" opacity="0.35"/>
    <ellipse cx="68" cy="82" rx="3" ry="3" fill="#4A3020" opacity="0.35"/>
    <!-- Big smile -->
    <path d="M40,97 Q55,110 70,97" stroke="#B87070" stroke-width="2" fill="none" opacity="0.35"/>
    <!-- Cheek blush (joy) -->
    <ellipse cx="35" cy="92" rx="8" ry="5" fill="#E89090" opacity="0.12"/>
    <ellipse cx="75" cy="92" rx="8" ry="5" fill="#E89090" opacity="0.12"/>
    <!-- Arms (open, welcoming gesture) -->
    <path d="M16,175 C-20,200 -25,250 -5,290" stroke="#F5E6D3" stroke-width="15" fill="none" stroke-linecap="round"/>
    <path d="M96,175 C130,200 135,250 115,290" stroke="#F5E6D3" stroke-width="15" fill="none" stroke-linecap="round"/>
    <!-- Hands (open, expressive) -->
    <ellipse cx="-8" cy="295" rx="15" ry="12" fill="#F5E6D3" opacity="0.8"/>
    <ellipse cx="118" cy="295" rx="15" ry="12" fill="#F5E6D3" opacity="0.8"/>
  </g>

  <!-- Woman 3 (right, slightly behind) -->
  <g transform="translate(700, 510)" opacity="0.85">
    <!-- Body -->
    <path d="M35,125 C12,130 5,162 8,210 L12,340 L75,340 L80,210 C82,162 75,130 50,125 Z" fill="#D8C8B0" opacity="0.75"/>
    <!-- Neck -->
    <rect x="35" y="102" width="17" height="26" fill="#F5E6D3"/>
    <!-- Head -->
    <ellipse cx="43" cy="78" rx="30" ry="33" fill="#F5E6D3"/>
    <!-- Hair (tied up) -->
    <path d="M13,68 C8,32 43,12 43,12 C43,12 78,32 73,68" fill="#1A1A1A"/>
    <circle cx="43" cy="58" rx="12" ry="10" fill="#1A1A1A"/>
    <!-- Face (smiling) -->
    <path d="M32,78 Q35,74 38,78" stroke="#1A1A1A" stroke-width="1.5" fill="none" opacity="0.35"/>
    <path d="M48,78 Q51,74 54,78" stroke="#1A1A1A" stroke-width="1.5" fill="none" opacity="0.35"/>
    <path d="M38,90 Q43,96 48,90" stroke="#C08080" stroke-width="1.5" fill="none" opacity="0.3"/>
    <!-- Arm (resting on table) -->
    <path d="M8,160 C-10,185 -5,230 10,260" stroke="#F5E6D3" stroke-width="13" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Decorative elements: warm light spots -->
  <circle cx="120" cy="600" r="8" fill="#FFD8A0" opacity="0.15"/>
  <circle cx="960" cy="500" r="10" fill="#FFD8A0" opacity="0.12"/>
  <circle cx="800" cy="700" r="6" fill="#FFD8A0" opacity="0.1"/>

  <!-- Sound lines (laughter abstraction) -->
  <g stroke="#C8A880" stroke-width="1.5" fill="none" opacity="0.15">
    <path d="M680,620 Q700,600 720,620"/>
    <path d="M690,640 Q715,618 740,640"/>
    <path d="M695,660 Q722,635 750,660"/>
  </g>

  <!-- Main text area -->
  <rect x="60" y="1150" width="960" height="220" rx="8" fill="#FAF8F5" opacity="0.92"/>

  <!-- Main headline -->
  <text x="540" y="1205" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="600" fill="#2C2C2C" letter-spacing="0">
    她的笑声，
  </text>
  <text x="540" y="1268" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="600" fill="#2C2C2C" letter-spacing="0">
    也属于她自己。
  </text>

  <!-- Sub text -->
  <text x="540" y="1320" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" fill="#6B6B6B" letter-spacing="1">
    妈妈不只是一个角色，是一个完整的人。
  </text>

  <!-- Brand tag -->
  <text x="540" y="1380" text-anchor="middle" font-family="system-ui, 'PingFang SC', sans-serif" font-size="18" fill="#A09080" letter-spacing="3">
    OPPO · 母亲节特别呈现
  </text>

  <!-- Bottom disclaimer -->
  <rect x="0" y="1400" width="1080" height="40" fill="#2C2C2C" opacity="0.04"/>
  <text x="540" y="1425" text-anchor="middle" font-family="system-ui, 'PingFang SC', sans-serif" font-size="13" fill="#8B7355" opacity="0.7" letter-spacing="2">
    母亲节传播重设计研究稿｜非官方发布物 · 记录她自己的热爱
  </text>
</svg>
