<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
  <title>妈妈，也有自己的热爱 — 清晨跑步的妈妈</title>
  <desc>OPPO母亲节传播重设计海报第二张：展示妈妈清晨跑步、自我照顾的时刻</desc>

  <!-- Background gradient: dawn sky -->
  <defs>
    <linearGradient id="dawnSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B8D4E8"/>
      <stop offset="40%" stop-color="#E8D8C4"/>
      <stop offset="100%" stop-color="#F5E8D8"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8D8C0"/>
      <stop offset="100%" stop-color="#D8E8D0"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1440" fill="url(#dawnSky)"/>

  <!-- Sunrise glow -->
  <ellipse cx="540" cy="900" rx="600" ry="300" fill="#FFE8C0" opacity="0.25"/>

  <!-- Abstract path/running track -->
  <path d="M0,900 Q200,850 400,870 Q600,890 800,860 Q1000,830 1080,840 L1080,1440 L0,1440 Z" fill="url(#groundGrad)"/>
  <path d="M0,910 Q270,865 540,880 Q810,895 1080,870" fill="none" stroke="#A8B898" stroke-width="2" opacity="0.4" stroke-dasharray="12,8"/>

  <!-- Simple trees/bushes (abstract) -->
  <g opacity="0.15" fill="#4A6B3A">
    <ellipse cx="80" cy="880" rx="60" ry="40"/>
    <ellipse cx="80" cy="860" rx="40" ry="35"/>
    <ellipse cx="950" cy="875" rx="70" ry="45"/>
    <ellipse cx="950" cy="855" rx="50" ry="38"/>
    <ellipse cx="300" cy="885" rx="45" ry="30"/>
    <ellipse cx="700" cy="880" rx="50" ry="32"/>
  </g>

  <!-- Running figure (female, abstract silhouette, motion) -->
  <g transform="translate(460, 600)">
    <!-- Motion lines -->
    <line x1="-60" y1="150" x2="-120" y2="145" stroke="#C4D0C0" stroke-width="2" opacity="0.3"/>
    <line x1="-60" y1="180" x2="-130" y2="175" stroke="#C4D0C0" stroke-width="2" opacity="0.25"/>
    <line x1="-60" y1="210" x2="-110" y2="210" stroke="#C4D0C0" stroke-width="2" opacity="0.2"/>

    <!-- Back leg (in motion) -->
    <path d="M55,370 L20,420 L5,470" stroke="#E8D8C8" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Front leg (in motion) -->
    <path d="M65,370 L100,420 L115,470" stroke="#E8D8C8" stroke-width="18" fill="none" stroke-linecap="round"/>

    <!-- Body (slight forward lean) -->
    <path d="M55,160 C35,160 25,190 30,230 L35,370 L75,370 L80,230 C85,190 75,160 55,160 Z" fill="#FF9080" opacity="0.75"/>

    <!-- Head -->
    <ellipse cx="55" cy="130" rx="35" ry="38" fill="#F5E6D3"/>
    <!-- Hair (tied up, ponytail) -->
    <path d="M20,115 C20,75 55,55 55,55 C55,55 90,75 90,115" fill="#4A3020"/>
    <ellipse cx="88" cy="100" rx="12" ry="8" fill="#4A3020"/>
    <path d="M85,95 Q110,70 100,110" stroke="#4A3020" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Face -->
    <ellipse cx="45" cy="128" rx="2" ry="2" fill="#4A3020" opacity="0.35"/>
    <ellipse cx="65" cy="128" rx="2" ry="2" fill="#4A3020" opacity="0.35"/>

    <!-- Arms (swinging) -->
    <path d="M30,180 C5,200 -5,250 10,290" stroke="#F5E6D3" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M80,180 C105,200 115,250 100,290" stroke="#F5E6D3" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Shoes -->
    <ellipse cx="5" cy="475" rx="15" ry="8" fill="#4A5058"/>
    <ellipse cx="115" cy="475" rx="15" ry="8" fill="#4A5058"/>
  </g>

  <!-- OPPO phone (abstract smartwatch/fitness band on wrist - very subtle) -->
  <g transform="translate(550, 810)">
    <rect width="14" height="22" rx="4" fill="#2C2C2C" opacity="0.08"/>
    <rect x="1" y="1" width="12" height="20" rx="3" fill="#3C3C3C" opacity="0.06"/>
  </g>

  <!-- Abstract morning light rays -->
  <g opacity="0.08" fill="#FFD080">
    <polygon points="540,0 580,900 500,900"/>
    <polygon points="300,0 340,900 260,900"/>
    <polygon points="780,0 820,900 740,900"/>
  </g>

  <!-- Main text area -->
  <rect x="60" y="1150" width="960" height="220" rx="8" fill="#FAF8F5" opacity="0.9"/>

  <!-- Main headline -->
  <text x="540" y="1205" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="600" fill="#2C2C2C" letter-spacing="0">
    清晨的路，
  </text>
  <text x="540" y="1268" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="52" font-weight="600" fill="#2C2C2C" letter-spacing="0">
    是她留给自己的时间。
  </text>

  <!-- Sub text -->
  <text x="540" y="1320" text-anchor="middle" font-family="system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" fill="#6B6B6B" letter-spacing="1">
    在成为家人的依靠之前，她也在照顾自己。
  </text>

  <!-- Brand tag -->
  <text x="540" y="1380" text-anchor="middle" font-family="system-ui, 'PingFang SC', sans-serif" font-size="18" fill="#A09080" letter-spacing="3">
    OPPO · 母亲节特别呈现
  </text>

  <!-- Bottom disclaimer -->
  <rect x="0" y="1400" width="1080" height="40" fill="#2C2C2C" opacity="0.04"/>
  <text x="540" y="1425" text-anchor="middle" font-family="system-ui, 'PingFang SC', sans-serif" font-size="13" fill="#8B7355" opacity="0.7" letter-spacing="2">
    母亲节传播重设计研究稿｜非官方发布物 · 记录她自己的热爱
  </text>
</svg>
