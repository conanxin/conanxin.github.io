<!-- semiotic-matrix.svg: 符号矩阵 - 展示争议文案中各符号的编码与解码 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="符号矩阵分析图">
  <title>符号矩阵：编码与解码分析</title>
  <desc>展示OPPO广告文案中核心符号在原圈层语境、广告编码语境和公众解码语境下的不同含义</desc>

  <rect width="800" height="450" fill="#FAF8F5"/>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#2C2C2C">符号矩阵：跨语境意义迁移分析</text>

  <!-- 表头 -->
  <g font-family="Arial, sans-serif" font-size="11" fill="#2C2C2C" font-weight="bold">
    <text x="250" y="60" text-anchor="middle">圈层内部语境</text>
    <text x="400" y="60" text-anchor="middle">广告编码语境</text>
    <text x="550" y="60" text-anchor="middle">公众解码语境</text>
    <text x="700" y="60" text-anchor="middle">风险点</text>
  </g>

  <!-- 列分隔线 -->
  <line x1="180" y1="70" x2="180" y2="420" stroke="#E8D5C4" stroke-width="1"/>
  <line x1="330" y1="70" x2="330" y2="420" stroke="#E8D5C4" stroke-width="1"/>
  <line x1="480" y1="70" x2="480" y2="420" stroke="#E8D5C4" stroke-width="1"/>

  <!-- 行1: 妈妈 -->
  <g transform="translate(50, 100)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2C2C2C">妈妈</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">母亲角色</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">家庭身份</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">被尊敬的对象</text>
  </g>
  <g transform="translate(250, 100)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#8B7355">广告主语</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#8B7355">'我妈有两个老公'</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">叙事被调侃</text>
  </g>
  <g transform="translate(400, 100)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#C41E3A">被调侃的母亲</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#C41E3A">母亲节被冒犯</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">情感伤害</text>
  </g>
  <g transform="translate(550, 100)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">母亲节广告</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">不应调侃</text>
  </g>
  <g transform="translate(700, 100)">
    <rect x="-10" y="-15" width="80" height="50" rx="3" fill="#C41E3A" opacity="0.15"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C41E3A">高风险</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#8B0000">情感基调偏差</text>
  </g>

  <!-- 行2: 老公 -->
  <g transform="translate(50, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2C2C2C">老公</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">[饭圈语境]</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">粉丝对偶像的昵称</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">圈内玩笑</text>
  </g>
  <g transform="translate(250, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#8B7355">'另一个老公'</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#8B7355">指偶像/明星</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">婚姻隐喻残留</text>
  </g>
  <g transform="translate(400, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#C41E3A">婚姻关系中的'老公'</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#C41E3A">暗示不忠/多元性关系</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">婚姻伦理联想</text>
  </g>
  <g transform="translate(550, 200)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">跨语境错位</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">婚姻联想被激活</text>
  </g>
  <g transform="translate(700, 200)">
    <rect x="-10" y="-15" width="80" height="50" rx="3" fill="#8B0000" opacity="0.2"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#8B0000">极高风险</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#8B0000">语境错配</text>
  </g>

  <!-- 行3: 婚纱 -->
  <g transform="translate(50, 300)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2C2C2C">婚纱</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">女性穿着</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">隆重场合</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">婚姻仪式符号</text>
  </g>
  <g transform="translate(250, 300)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#8B7355">'恨不得穿婚纱'</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#8B7355">形容重视程度</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">偶像>配偶?</text>
  </g>
  <g transform="translate(400, 300)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#C41E3A">婚姻的神圣感被消费</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#C41E3A">对婚姻的不尊重联想</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">家庭伦理冲突</text>
  </g>
  <g transform="translate(550, 300)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">神圣符号被挪用</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">家庭伦理挑战</text>
  </g>
  <g transform="translate(700, 300)">
    <rect x="-10" y="-15" width="80" height="50" rx="3" fill="#C41E3A" opacity="0.15"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C41E3A">高风险</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#8B0000">符号商品化</text>
  </g>

  <!-- 行4: 追星 -->
  <g transform="translate(50, 400)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2C2C2C">追星</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">粉丝行为</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">个人爱好</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">圈层内部正当</text>
  </g>
  <g transform="translate(250, 400)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#8B7355">'见另一个'</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#8B7355">偶像见面</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">圈层话语混入</text>
  </g>
  <g transform="translate(400, 400)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="11" fill="#C41E3A">母亲被性缘化</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="11" fill="#C41E3A">母亲主体性被贬低</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">母职与偶像混同</text>
  </g>
  <g transform="translate(550, 400)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">母亲被客体化</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">关系错配</text>
  </g>
  <g transform="translate(700, 400)">
    <rect x="-10" y="-15" width="80" height="50" rx="3" fill="#C41E3A" opacity="0.15"/>
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#C41E3A">高风险</text>
    <text x="0" y="15" font-family="Arial, sans-serif" font-size="9" fill="#8B0000">主体错配</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B" font-style="italic">
    本矩阵用于分析符号从圈层内部语境到公共话语场的意义迁移过程，帮助理解为何看似无害的广告会引发强烈舆论反应。
  </text>
</svg>