<!-- responsibility-overflow-map.svg: 责任外溢模型 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" role="img" aria-label="责任外溢与归因扩散模型">
  <title>责任外溢模型：从企业到个人的归因扩散</title>
  <desc>分析OPPO事件中责任归因如何从品牌扩散到个人再到机构的过程</desc>

  <rect width="800" height="380" fill="#FAF8F5"/>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#2C2C2C">责任外溢模型：从批评品牌到个体追索</text>

  <!-- 副标题 -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B" font-style="italic">分析责任归因的逐级扩散路径，以及何时发生了越位</text>

  <!-- 五个阶段：阶梯式排列 -->
  <!-- 阶段1: 文案责任 -->
  <g transform="translate(100, 120)">
    <rect x="-70" y="-35" width="140" height="70" rx="6" fill="#F0EDE8" stroke="#8B7355" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8B7355">阶段 1</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C2C2C">文案责任</text>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">原始广告内容的伦理风险</text>
  </g>
  <!-- 箭头 -->
  <text x="180" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6B6B6B">→</text>

  <!-- 阶段2: 品牌责任 -->
  <g transform="translate(230, 120)">
    <rect x="-70" y="-35" width="140" height="70" rx="6" fill="#F0EDE8" stroke="#6B6B6B" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6B6B6B">阶段 2</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C2C2C">品牌责任</text>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">OPPO作为发布主体</text>
  </g>
  <!-- 箭头 -->
  <text x="310" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#6B6B6B">→</text>

  <!-- 阶段3: 组织责任 -->
  <g transform="translate(360, 120)">
    <rect x="-70" y="-35" width="140" height="70" rx="6" fill="#FFF5F5" stroke="#C41E3A" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#C41E3A">阶段 3</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C2C2C">组织责任</text>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">内部审核机制失效</text>
  </g>
  <!-- 箭头 -->
  <text x="440" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#C41E3A">→</text>

  <!-- 阶段4: 个人责任 -->
  <g transform="translate(490, 120)">
    <rect x="-70" y="-35" width="140" height="70" rx="6" fill="#FFE4E4" stroke="#8B0000" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8B0000">阶段 4</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C2C2C">个人责任</text>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B0000">相关责任人（已处分）</text>
  </g>
  <!-- 箭头 -->
  <text x="570" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#8B0000">→</text>

  <!-- 阶段5: 机构责任 -->
  <g transform="translate(640, 120)">
    <rect x="-70" y="-35" width="140" height="70" rx="6" fill="#FFE4E4" stroke="#8B0000" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8B0000">阶段 5</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2C2C2C">机构责任</text>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B0000">涉事个人关联机构</text>
  </g>

  <!-- 归因下沉箭头（右侧） -->
  <g transform="translate(760, 120)">
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#8B0000" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="15" y="0" font-family="Arial, sans-serif" font-size="9" fill="#8B0000" transform="rotate(-90, 15, 0)">归因下沉</text>
  </g>

  <!-- 分界线：合理 vs 越位 -->
  <line x1="50" y1="210" x2="750" y2="210" stroke="#E8D5C4" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- 左侧：合理批评区域 -->
  <g transform="translate(150, 260)">
    <rect x="-100" y="-40" width="200" height="80" rx="6" fill="#F0F5E8" stroke="#4A7C59" stroke-width="1.5"/>
    <text x="0" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#4A7C59">合理批评</text>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C2C2C">批评企业广告内容</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C2C2C">要求企业问责处理</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C2C2C">讨论行业伦理规范</text>
  </g>

  <!-- 右侧：越位区域 -->
  <g transform="translate(500, 260)">
    <rect x="-100" y="-40" width="200" height="80" rx="6" fill="#FFE4E4" stroke="#8B0000" stroke-width="1.5"/>
    <text x="0" y="-20" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#8B0000">越位行为</text>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">传播私人信息/开盒</text>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">骚扰当事人及家属</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">攻击母校/索要说法</text>
  </g>

  <!-- 中心线 -->
  <line x1="350" y1="225" x2="350" y2="340" stroke="#C41E3A" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="350" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#C41E3A">边界</text>

  <!-- 底部说明 -->
  <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B" font-style="italic">
    OPPO内部问责通告（src_003）已对相关责任人做出处分。公众批评企业合理，但传播个人隐私、骚扰家属属于越位，可能违反《网络暴力信息治理规定》（src_007）。
  </text>
</svg>