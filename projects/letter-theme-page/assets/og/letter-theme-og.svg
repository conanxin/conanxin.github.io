<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7F5F0"/>
      <stop offset="100%" stop-color="#E8E4DC"/>
    </linearGradient>
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A6FA5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4A6FA5" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2C2C2C" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle paper texture dots -->
  <g fill="#2C2C2C" opacity="0.03">
    <circle cx="120" cy="80" r="1.5"/><circle cx="340" cy="150" r="1"/><circle cx="560" cy="60" r="1.5"/>
    <circle cx="780" cy="180" r="1"/><circle cx="1000" cy="90" r="1.5"/><circle cx="180" cy="280" r="1"/>
    <circle cx="420" cy="320" r="1.5"/><circle cx="660" cy="260" r="1"/><circle cx="900" cy="340" r="1.5"/>
    <circle cx="240" cy="480" r="1"/><circle cx="520" cy="520" r="1.5"/><circle cx="800" cy="460" r="1"/>
    <circle cx="1080" cy="540" r="1.5"/><circle cx="80" cy="580" r="1"/><circle cx="1120" cy="280" r="1.5"/>
  </g>

  <!-- Sea waves (bottom half) -->
  <path d="M0 380 Q150 340 300 380 T600 380 T900 380 T1200 380 L1200 630 L0 630 Z" fill="url(#seaGrad)"/>
  <path d="M0 420 Q200 380 400 420 T800 420 T1200 420 L1200 630 L0 630 Z" fill="#4A6FA5" opacity="0.08"/>
  <path d="M0 480 Q180 450 360 480 T720 480 T1200 480 L1200 630 L0 630 Z" fill="#4A6FA5" opacity="0.06"/>

  <!-- Dotted route line from left to right -->
  <path d="M180 240 Q400 200 600 280 T1020 220" fill="none" stroke="#B85C50" stroke-width="2.5" stroke-dasharray="8 6" opacity="0.6"/>

  <!-- Origin point (homeland) -->
  <circle cx="180" cy="240" r="10" fill="#B85C50" opacity="0.9"/>
  <circle cx="180" cy="240" r="18" fill="none" stroke="#B85C50" stroke-width="1.5" opacity="0.3"/>

  <!-- Destination point (distant shore) -->
  <circle cx="1020" cy="220" r="10" fill="#4A6FA5" opacity="0.9"/>
  <circle cx="1020" cy="220" r="18" fill="none" stroke="#4A6FA5" stroke-width="1.5" opacity="0.3"/>

  <!-- Envelope in the middle of the route -->
  <g transform="translate(540, 222) rotate(-8)" filter="url(#softShadow)">
    <rect x="0" y="0" width="120" height="76" rx="4" fill="#FFFFFF" stroke="#D4CFC6" stroke-width="1"/>
    <!-- Envelope flap -->
    <path d="M0 0 L60 38 L120 0" fill="none" stroke="#D4CFC6" stroke-width="1"/>
    <path d="M0 0 L60 42 L120 0" fill="#FAFAF8" opacity="0.5"/>
    <!-- Wax seal -->
    <circle cx="60" cy="30" r="12" fill="#B85C50" opacity="0.85"/>
    <circle cx="60" cy="30" r="8" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Small stamps/decorative elements -->
  <g transform="translate(1050, 160) rotate(12)" opacity="0.25">
    <rect x="0" y="0" width="48" height="56" rx="2" fill="none" stroke="#B85C50" stroke-width="1.5"/>
    <line x1="8" y1="12" x2="40" y2="12" stroke="#B85C50" stroke-width="1"/>
    <line x1="8" y1="20" x2="32" y2="20" stroke="#B85C50" stroke-width="1"/>
    <line x1="8" y1="28" x2="36" y2="28" stroke="#B85C50" stroke-width="1"/>
    <circle cx="24" cy="44" r="8" fill="none" stroke="#B85C50" stroke-width="1"/>
  </g>

  <g transform="translate(110, 300) rotate(-6)" opacity="0.2">
    <rect x="0" y="0" width="40" height="48" rx="2" fill="none" stroke="#4A6FA5" stroke-width="1.5"/>
    <circle cx="20" cy="24" r="10" fill="none" stroke="#4A6FA5" stroke-width="1"/>
  </g>

  <!-- Title text -->
  <text x="600" y="200" text-anchor="middle" font-family="Georgia, 'Times New Roman', 'Noto Serif SC', serif" font-size="72" font-weight="700" fill="#2C2C2C" letter-spacing="0.08em">信抵达之前</text>

  <!-- Subtitle -->
  <text x="600" y="255" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-style="italic" fill="#6B6B6B">从《给阿嬷的情书》到书信母题</text>

  <!-- Decorative line under subtitle -->
  <line x1="480" y1="275" x2="720" y2="275" stroke="#B85C50" stroke-width="1.5" opacity="0.4"/>

  <!-- Small caption at bottom -->
  <text x="600" y="590" text-anchor="middle" font-family="'Courier New', monospace" font-size="12" fill="#9B9B9B" letter-spacing="0.15em">A THEME ARCHIVE OF LETTERS IN ARTS &amp; FILM</text>
</svg>