<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8e44ad"/>
      <stop offset="100%" stop-color="#9b59b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g stroke="#1e2d40" stroke-width="1" opacity="0.6">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Broadcast / signal icon -->
  <g transform="translate(70, 80)">
    <circle cx="30" cy="30" r="10" fill="#9b59b6" opacity="0.8"/>
    <path d="M10 20 Q30 -5 50 20" fill="none" stroke="#9b59b6" stroke-width="3" opacity="0.7"/>
    <path d="M0 10 Q30 -20 60 10" fill="none" stroke="#9b59b6" stroke-width="3" opacity="0.5"/>
    <path d="M10 40 Q30 65 50 40" fill="none" stroke="#9b59b6" stroke-width="3" opacity="0.7"/>
    <path d="M0 50 Q30 75 60 50" fill="none" stroke="#9b59b6" stroke-width="3" opacity="0.5"/>
  </g>

  <text x="60" y="168" font-family="sans-serif" font-size="42" font-weight="bold" fill="#e8f0fa" filter="url(#glow)">旧互联网建设者资料库</text>
  <text x="60" y="215" font-family="sans-serif" font-size="22" fill="#8ba4c7" letter-spacing="2">Internet Builder Archive</text>

  <rect x="60" y="235" width="500" height="2" fill="url(#accent)" rx="1"/>

  <text x="60" y="295" font-family="sans-serif" font-size="54" font-weight="bold" fill="#9b59b6">媒介、社会与自我</text>
  <text x="60" y="340" font-family="sans-serif" font-size="24" fill="#8e44ad">Media, Society &amp; Identity</text>

  <text x="60" y="385" font-family="sans-serif" font-size="20" fill="#8ba4c7">理解广告、宣传、媒介记忆、互联网成瘾</text>
  <text x="60" y="415" font-family="sans-serif" font-size="20" fill="#8ba4c7">与自我塑造如何影响现代人。</text>

  <g transform="translate(60, 445)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#1a2a40" stroke="#8e44ad" stroke-width="1.5"/>
    <text x="70" y="32" font-family="sans-serif" font-size="32" font-weight="bold" fill="#9b59b6" text-anchor="middle">8</text>
    <text x="70" y="55" font-family="sans-serif" font-size="14" fill="#8ba4c7" text-anchor="middle">items</text>
  </g>

  <g transform="translate(220, 445)">
    <rect x="0" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#8e44ad" stroke-width="1"/>
    <text x="35" y="23" font-family="sans-serif" font-size="14" fill="#9b59b6" text-anchor="middle">媒介</text>

    <rect x="80" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#8e44ad" stroke-width="1"/>
    <text x="115" y="23" font-family="sans-serif" font-size="14" fill="#9b59b6" text-anchor="middle">社会</text>

    <rect x="160" y="0" width="80" height="34" rx="17" fill="#1a2a40" stroke="#8e44ad" stroke-width="1"/>
    <text x="200" y="23" font-family="sans-serif" font-size="14" fill="#9b59b6" text-anchor="middle">注意力</text>

    <rect x="250" y="0" width="80" height="34" rx="17" fill="#1a2a40" stroke="#8e44ad" stroke-width="1"/>
    <text x="290" y="23" font-family="sans-serif" font-size="14" fill="#9b59b6" text-anchor="middle">现代性</text>
  </g>

  <rect x="0" y="560" width="1200" height="2" fill="#1e2d40"/>
  <text x="60" y="595" font-family="sans-serif" font-size="20" fill="#9b59b6">conanxin.github.io/projects/internet-builder-archive/</text>

  <g transform="translate(920, 100)" opacity="0.12">
    <circle cx="100" cy="100" r="180" fill="none" stroke="#8e44ad" stroke-width="1"/>
    <circle cx="100" cy="100" r="140" fill="none" stroke="#8e44ad" stroke-width="1"/>
    <circle cx="100" cy="100" r="100" fill="none" stroke="#8e44ad" stroke-width="1"/>
  </g>
</svg>