<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#16a085"/>
      <stop offset="100%" stop-color="#1abc9c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g stroke="#1e2d40" stroke-width="1" opacity="0.6">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Circuit / chip icon -->
  <g transform="translate(70, 80)">
    <rect x="0" y="0" width="60" height="60" rx="6" fill="#1abc9c" opacity="0.2" stroke="#1abc9c" stroke-width="2"/>
    <rect x="10" y="10" width="40" height="40" rx="4" fill="#16a085" opacity="0.4"/>
    <line x1="0" y1="20" x2="10" y2="20" stroke="#1abc9c" stroke-width="2"/>
    <line x1="0" y1="40" x2="10" y2="40" stroke="#1abc9c" stroke-width="2"/>
    <line x1="50" y1="20" x2="60" y2="20" stroke="#1abc9c" stroke-width="2"/>
    <line x1="50" y1="40" x2="60" y2="40" stroke="#1abc9c" stroke-width="2"/>
    <line x1="20" y1="0" x2="20" y2="10" stroke="#1abc9c" stroke-width="2"/>
    <line x1="40" y1="0" x2="40" y2="10" stroke="#1abc9c" stroke-width="2"/>
    <line x1="20" y1="50" x2="20" y2="60" stroke="#1abc9c" stroke-width="2"/>
    <line x1="40" y1="50" x2="40" y2="60" stroke="#1abc9c" stroke-width="2"/>
    <circle cx="30" cy="30" r="8" fill="#1abc9c" opacity="0.6"/>
  </g>

  <text x="60" y="168" font-family="sans-serif" font-size="42" font-weight="bold" fill="#e8f0fa" filter="url(#glow)">旧互联网建设者资料库</text>
  <text x="60" y="215" font-family="sans-serif" font-size="22" fill="#8ba4c7" letter-spacing="2">Internet Builder Archive</text>

  <rect x="60" y="235" width="500" height="2" fill="url(#accent)" rx="1"/>

  <text x="60" y="295" font-family="sans-serif" font-size="54" font-weight="bold" fill="#1abc9c">技术创业史</text>
  <text x="60" y="340" font-family="sans-serif" font-size="24" fill="#16a085">Tech Startup History</text>

  <text x="60" y="385" font-family="sans-serif" font-size="20" fill="#8ba4c7">从个人计算、互联网服务化、创业公司与技术浪潮中</text>
  <text x="60" y="415" font-family="sans-serif" font-size="20" fill="#8ba4c7">理解旧互联网到现代科技公司的历史线。</text>

  <g transform="translate(60, 445)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#1a2a40" stroke="#1abc9c" stroke-width="1.5"/>
    <text x="70" y="32" font-family="sans-serif" font-size="32" font-weight="bold" fill="#1abc9c" text-anchor="middle">8</text>
    <text x="70" y="55" font-family="sans-serif" font-size="14" fill="#8ba4c7" text-anchor="middle">items</text>
  </g>

  <g transform="translate(220, 445)">
    <rect x="0" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#1abc9c" stroke-width="1"/>
    <text x="35" y="23" font-family="sans-serif" font-size="14" fill="#1abc9c" text-anchor="middle">技术史</text>

    <rect x="80" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#1abc9c" stroke-width="1"/>
    <text x="115" y="23" font-family="sans-serif" font-size="14" fill="#1abc9c" text-anchor="middle">创业</text>

    <rect x="160" y="0" width="80" height="34" rx="17" fill="#1a2a40" stroke="#1abc9c" stroke-width="1"/>
    <text x="200" y="23" font-family="sans-serif" font-size="14" fill="#1abc9c" text-anchor="middle">平台转型</text>

    <rect x="250" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#1abc9c" stroke-width="1"/>
    <text x="285" y="23" font-family="sans-serif" font-size="14" fill="#1abc9c" text-anchor="middle">互联网</text>
  </g>

  <rect x="0" y="560" width="1200" height="2" fill="#1e2d40"/>
  <text x="60" y="595" font-family="sans-serif" font-size="20" fill="#1abc9c">conanxin.github.io/projects/internet-builder-archive/</text>

  <g transform="translate(920, 100)" opacity="0.12">
    <circle cx="100" cy="100" r="180" fill="none" stroke="#1abc9c" stroke-width="1"/>
    <circle cx="100" cy="100" r="140" fill="none" stroke="#1abc9c" stroke-width="1"/>
    <circle cx="100" cy="100" r="100" fill="none" stroke="#1abc9c" stroke-width="1"/>
  </g>
</svg>