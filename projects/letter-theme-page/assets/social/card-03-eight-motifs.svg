<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <defs>
    <style>
      
  .bg { fill: #f7f4ee; }
  .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; font-weight: 700; }
  .body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .url { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .accent-red { fill: #c25e5e; }
  .accent-blue { fill: #4a6fa5; }
  .accent-green { fill: #4a7c59; }
  .ink { fill: #2a2520; }
  .ink-secondary { fill: #5a544d; }
  .ink-tertiary { fill: #8a837a; }

    </style>
  </defs>
  <rect class="bg" width="1200" height="1600"/>
  
  <!-- Title -->
  <text x="600" y="220" text-anchor="middle" class="title" font-size="64" fill="#2a2520">八种书信母题</text>
  <rect x="500" y="245" width="200" height="3" fill="#4a7c59" opacity="0.4"/>
  
  <!-- 8 motif circles in 2x4 grid -->
  <g transform="translate(600, 720)">
    <!-- Row 1 -->
    <g transform="translate(-420, -200)">
      <circle r="70" fill="#fff" stroke="#c25e5e" stroke-width="2" opacity="0.8"/>
      <text y="-8" text-anchor="middle" class="title" font-size="20" fill="#2a2520">代写之信</text>
      <text y="18" text-anchor="middle" class="body" font-size="13" fill="#8a837a">Ghostwriting</text>
    </g>
    <g transform="translate(-140, -200)">
      <circle r="70" fill="#fff" stroke="#c25e5e" stroke-width="2" opacity="0.8"/>
      <text y="-8" text-anchor="middle" class="title" font-size="20" fill="#2a2520">迟到之信</text>
      <text y="18" text-anchor="middle" class="body" font-size="13" fill="#8a837a">Delayed</text>
    </g>
    <g transform="translate(140, -200)">
      <circle r="70" fill="#fff" stroke="#c25e5e" stroke-width="2" opacity="0.8"/>
      <text y="-8" text-anchor="middle" class="title" font-size="20" fill="#2a2520">亡者之信</text>
      <text y="18" text-anchor="middle" class="body" font-size="13" fill="#8a837a">Afterlife</text>
    </g>
    <g transform="translate(420, -200)">
      <circle r="70" fill="#fff" stroke="#c25e5e" stroke-width="2" opacity="0.8"/>
      <text y="-8" text-anchor="middle" class="title" font-size="20" fill="#2a2520">移民之信</text>
      <text y="18" text-anchor="middle" class="body" font-size="13" fill="#8a837a">Migration</text>
    </g>
    <!-- Row 2 -->
    <g transform="translate(-420, 80)">
      <circle r="70" fill="#fff" stroke="#4a6fa5" stroke-width="2" opacity="0.8"/>
      <text y="-8" text-anchor="middle" class="title" font-size="20" fill="#2a2520">战争之信</text>
      <text y="18" text-anchor="middle" class="body" font-size="13" fill="#8a837a">Wartime</text>
    </g>
    <g transform="translate(-140, 80)">
      <circle r="70" fill="#fff" stroke="#4a6fa5" stroke-width="2" opacity="0.8"/>
      <text y="-8" text-anchor="middle" class="title" font-size="20" fill="#2a2520">未寄之信</text>
      <text y="18" text-anchor="middle" class="body" font-size="13" fill="#8a837a">Unsent</text>
    </g>
    <g transform="translate(140, 80)">
      <circle r="70" fill="#fff" stroke="#4a7c59" stroke-width="2" opacity="0.8"/>
      <text y="-8" text-anchor="middle" class="title" font-size="20" fill="#2a2520">送信者</text>
      <text y="18" text-anchor="middle" class="body" font-size="13" fill="#8a837a">Messenger</text>
    </g>
    <g transform="translate(420, 80)">
      <circle r="70" fill="#fff" stroke="#4a7c59" stroke-width="2" opacity="0.8"/>
      <text y="-8" text-anchor="middle" class="title" font-size="20" fill="#2a2520">信件档案</text>
      <text y="18" text-anchor="middle" class="body" font-size="13" fill="#8a837a">Archive</text>
    </g>
  </g>
  
  <!-- Body text -->
  <text x="600" y="1100" text-anchor="middle" class="body" font-size="28" fill="#5a544d">八个切面，理解「信」的 53 种表达。</text>
  
  <!-- Bottom URL -->
  <text x="600" y="1480" text-anchor="middle" class="url" font-size="20" fill="#8a837a">conanxin.github.io/projects/letter-theme-page</text>
  
  <rect x="100" y="1520" width="1000" height="2" fill="#d4cfc7" opacity="0.4"/>
</svg>