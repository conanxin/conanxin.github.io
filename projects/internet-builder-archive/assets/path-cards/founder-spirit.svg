<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e67e22"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#1e2d40" stroke-width="1" opacity="0.6">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="314" x2="1200" y2="314"/>
    <line x1="0" y1="471" x2="1200" y2="471"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Left accent bar (orange-red) -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Flame / founder icon -->
  <g transform="translate(70, 80)">
    <path d="M30 60 Q10 40 20 20 Q30 0 50 10 Q70 0 80 20 Q90 40 70 60 Q60 70 50 75 Q40 70 30 60Z" fill="#e67e22" opacity="0.85"/>
    <path d="M35 55 Q20 40 28 25 Q38 10 50 18 Q62 10 72 25 Q80 40 65 55 Q55 62 50 64 Q45 62 35 55Z" fill="#f39c12" opacity="0.7"/>
    <rect x="44" y="60" width="12" height="18" rx="3" fill="#c0392b" opacity="0.8"/>
  </g>

  <!-- Project label -->
  <text x="60" y="168" font-family="sans-serif" font-size="42" font-weight="bold" fill="#e8f0fa" filter="url(#glow)">旧互联网建设者资料库</text>
  <text x="60" y="215" font-family="sans-serif" font-size="22" fill="#8ba4c7" letter-spacing="2">Internet Builder Archive</text>

  <!-- Divider -->
  <rect x="60" y="235" width="500" height="2" fill="url(#accent)" rx="1"/>

  <!-- Path title -->
  <text x="60" y="295" font-family="sans-serif" font-size="54" font-weight="bold" fill="#f39c12">创始人精神谱系</text>
  <text x="60" y="340" font-family="sans-serif" font-size="24" fill="#e67e22">Founders &amp; Their Vision</text>

  <!-- Description -->
  <text x="60" y="385" font-family="sans-serif" font-size="20" fill="#8ba4c7">从亚马逊、苹果、Airbnb、General Magic 与 Startup.com</text>
  <text x="60" y="415" font-family="sans-serif" font-size="20" fill="#8ba4c7">理解创始人如何面对产品、市场、组织与失败。</text>

  <!-- Item count badge -->
  <g transform="translate(60, 445)">
    <rect x="0" y="0" width="140" height="70" rx="8" fill="#1a2a40" stroke="#e67e22" stroke-width="1.5"/>
    <text x="70" y="32" font-family="sans-serif" font-size="32" font-weight="bold" fill="#f39c12" text-anchor="middle">8</text>
    <text x="70" y="55" font-family="sans-serif" font-size="14" fill="#8ba4c7" text-anchor="middle">items</text>
  </g>

  <!-- Tags -->
  <g transform="translate(220, 445)">
    <rect x="0" y="0" width="90" height="34" rx="17" fill="#1a2a40" stroke="#e67e22" stroke-width="1"/>
    <text x="45" y="23" font-family="sans-serif" font-size="14" fill="#f39c12" text-anchor="middle">创始人</text>

    <rect x="100" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#e67e22" stroke-width="1"/>
    <text x="135" y="23" font-family="sans-serif" font-size="14" fill="#f39c12" text-anchor="middle">产品</text>

    <rect x="180" y="0" width="70" height="34" rx="17" fill="#1a2a40" stroke="#e67e22" stroke-width="1"/>
    <text x="215" y="23" font-family="sans-serif" font-size="14" fill="#f39c12" text-anchor="middle">失败</text>

    <rect x="260" y="0" width="90" height="34" rx="17" fill="#1a2a40" stroke="#e67e22" stroke-width="1"/>
    <text x="305" y="23" font-family="sans-serif" font-size="14" fill="#f39c12" text-anchor="middle">长期主义</text>
  </g>

  <!-- Bottom URL -->
  <rect x="0" y="560" width="1200" height="2" fill="#1e2d40"/>
  <text x="60" y="595" font-family="sans-serif" font-size="20" fill="#e67e22">conanxin.github.io/projects/internet-builder-archive/</text>

  <!-- Right decorative circles -->
  <g transform="translate(920, 100)" opacity="0.12">
    <circle cx="100" cy="100" r="180" fill="none" stroke="#e67e22" stroke-width="1"/>
    <circle cx="100" cy="100" r="140" fill="none" stroke="#e67e22" stroke-width="1"/>
    <circle cx="100" cy="100" r="100" fill="none" stroke="#e67e22" stroke-width="1"/>
  </g>
</svg>