<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <defs>
    <style>
      
  .bg { fill: #f7f4ee; }
  .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; font-weight: 700; }
  .body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .url { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; }
  .accent-red { fill: #c25e5e; }
  .accent-blue { fill: #4a6fa5; }
  .accent-green { fill: #4a7c59; }
  .ink { fill: #2a2520; }
  .ink-secondary { fill: #5a544d; }
  .ink-tertiary { fill: #8a837a; }

    </style>
  </defs>
  <rect class="bg" width="1200" height="1600"/>
  
  <!-- Decorative top border -->
  <rect x="100" y="80" width="1000" height="3" fill="#c25e5e" opacity="0.3"/>
  
  <!-- Envelope illustration -->
  <g transform="translate(600, 520)">
    <rect x="-180" y="-120" width="360" height="240" rx="4" fill="none" stroke="#c25e5e" stroke-width="2" opacity="0.4"/>
    <line x1="-180" y1="-120" x2="0" y2="0" stroke="#c25e5e" stroke-width="1.5" opacity="0.3"/>
    <line x1="180" y1="-120" x2="0" y2="0" stroke="#c25e5e" stroke-width="1.5" opacity="0.3"/>
    <line x1="-180" y1="120" x2="0" y2="0" stroke="#c25e5e" stroke-width="1.5" opacity="0.3"/>
    <line x1="180" y1="120" x2="0" y2="0" stroke="#c25e5e" stroke-width="1.5" opacity="0.3"/>
    <!-- Letter peeking out -->
    <rect x="-140" y="-160" width="280" height="200" rx="2" fill="#fff" stroke="#d4cfc7" stroke-width="1"/>
    <line x1="-120" y1="-130" x2="120" y2="-130" stroke="#d4cfc7" stroke-width="1"/>
    <line x1="-120" y1="-110" x2="100" y2="-110" stroke="#d4cfc7" stroke-width="1"/>
    <line x1="-120" y1="-90" x2="80" y2="-90" stroke="#d4cfc7" stroke-width="1"/>
    <line x1="-120" y1="-70" x2="110" y2="-70" stroke="#d4cfc7" stroke-width="1"/>
    <!-- Postmark -->
    <circle cx="130" cy="80" r="36" fill="none" stroke="#c25e5e" stroke-width="1.5" opacity="0.5"/>
    <circle cx="130" cy="80" r="28" fill="none" stroke="#c25e5e" stroke-width="1" opacity="0.4"/>
    <text x="130" y="84" text-anchor="middle" class="body" font-size="10" fill="#c25e5e" opacity="0.6">POSTED</text>
  </g>
  
  <!-- Title -->
  <text x="600" y="860" text-anchor="middle" class="title" font-size="72" fill="#2a2520">信是替身</text>
  
  <!-- Subtitle line -->
  <rect x="500" y="890" width="200" height="2" fill="#c25e5e" opacity="0.4"/>
  
  <!-- Body text -->
  <text x="600" y="980" text-anchor="middle" class="body" font-size="32" fill="#5a544d">人不在，字还在。</text>
  <text x="600" y="1030" text-anchor="middle" class="body" font-size="32" fill="#5a544d">声音消失后，信仍会替一个人抵达。</text>
  
  <!-- Bottom URL -->
  <text x="600" y="1480" text-anchor="middle" class="url" font-size="20" fill="#8a837a">conanxin.github.io/projects/letter-theme-page</text>
  
  <!-- Bottom decorative line -->
  <rect x="100" y="1520" width="1000" height="2" fill="#d4cfc7" opacity="0.4"/>
</svg>