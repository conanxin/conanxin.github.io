<!-- crisis-response-compare.svg: OPPO两次回应对比 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="OPPO两次危机回应对比表">
  <title>危机回应对比：第一次 vs 第二次道歉</title>
  <desc>比较OPPO第一次和第二次道歉在时间、话术、责任承认程度等方面的差异</desc>

  <rect width="800" height="400" fill="#FAF8F5"/>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#2C2C2C">危机回应对比：第一次 vs 第二次道歉</text>

  <!-- 表头 -->
  <g font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C2C2C">
    <text x="200" y="65" text-anchor="middle">维度</text>
    <text x="400" y="65" text-anchor="middle">第一次道歉（5月8日）</text>
    <text x="600" y="65" text-anchor="middle">第二次道歉（5月11日）</text>
  </g>

  <!-- 分隔线 -->
  <line x1="50" y1="75" x2="750" y2="75" stroke="#E8D5C4" stroke-width="1"/>
  <line x1="300" y1="75" x2="300" y2="370" stroke="#E8D5C4" stroke-width="1"/>
  <line x1="500" y1="75" x2="500" y2="370" stroke="#E8D5C4" stroke-width="1"/>

  <!-- 行1: 时间 -->
  <g transform="translate(200, 100)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C2C2C">时间</text>
    <text x="0" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">舆情爆发当天</text>
    <text x="0" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">（约几小时内）</text>
  </g>
  <g transform="translate(400, 100)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6B6B6B">快速下架+道歉</text>
    <text x="0" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B7355">被动响应</text>
  </g>
  <g transform="translate(600, 100)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#C41E3A">3天后</text>
    <text x="0" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A7C59">主动深度反思</text>
  </g>

  <!-- 行2: 核心话术 -->
  <g transform="translate(200, 160)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C2C2C">核心话术</text>
  </g>
  <g transform="translate(400, 160)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">'初衷是呈现更</text>
    <text x="0" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6B6B6B">多元形象'</text>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B7355">（淡化问题）</text>
  </g>
  <g transform="translate(600, 160)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2C2C2C">'追逐流量而忘记本心'</text>
    <text x="0" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#C41E3A">承认价值观缺失</text>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B7355">（直面问题）</text>
  </g>

  <!-- 行3: 责任承认 -->
  <g transform="translate(200, 220)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C2C2C">责任承认</text>
  </g>
  <g transform="translate(400, 220)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B7355">轻微</text>
    <text x="0" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">未提及具体责任人</text>
  </g>
  <g transform="translate(600, 220)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#C41E3A">高</text>
    <text x="0" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C2C2C">明确承认管理失责</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C2C2C">高管受到处分</text>
  </g>

  <!-- 行4: 舆情效果 -->
  <g transform="translate(200, 280)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C2C2C">舆情效果</text>
  </g>
  <g transform="translate(400, 280)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8B0000">未能平息</text>
    <text x="0" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">被指'敷衍'</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">批评持续扩大</text>
  </g>
  <g transform="translate(600, 280)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A7C59">明显好转</text>
    <text x="0" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C2C2C">批评声量下降</text>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C2C2C">转向讨论行业规范</text>
  </g>

  <!-- 行5: SCCT分析 -->
  <g transform="translate(200, 340)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#2C2C2C">SCCT理论</text>
  </g>
  <g transform="translate(400, 340)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8B7355">否认策略</text>
    <text x="0" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B">→责任归因上升</text>
  </g>
  <g transform="translate(600, 340)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4A7C59">重建策略</text>
    <text x="0" y="14" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#2C2C2C">→责任归因下降</text>
  </g>

  <!-- 底部说明 -->
  <text x="400" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6B6B6B" font-style="italic">
    SCCT（情境危机传播理论）分析：第一次回应选择了与危机类型不匹配的策略，导致批评升级；第二次调整后有效降低了舆情压力。
  </text>
</svg>